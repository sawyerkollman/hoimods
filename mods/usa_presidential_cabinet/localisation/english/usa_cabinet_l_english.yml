l_english:

 # ============================ FOCUSES ============================

 # --- Trunk ---
 USA_trunk_inheritance_of_32:0 "The Inheritance of '32"
 USA_trunk_inheritance_of_32_desc:0 "Four years after the Crash the banks have reopened, but a quarter of the nation still stands idle. Whatever Washington becomes in the next twenty years begins with what it does about the Depression."
 USA_trunk_brain_trust:0 "The Brain Trust"
 USA_trunk_brain_trust_desc:0 "Roosevelt does not govern alone: he governs through a circle of professors, lawyers, and loyalists, and through the secretaries who command the great departments of state. Assemble that circle with care, for its quiet war between reformers and the Old Guard will decide which America emerges from the gathering storm."
 USA_secretary_of_state:0 "The State Department"
 USA_secretary_of_state_desc:0 "Foggy Bottom speaks for America to the world, and the Secretary of State sets the tone of its voice. In an age of dictators on the march, will that voice call for engagement, or insist that Europe's ancient quarrels are no concern of ours?"
 USA_appoint_hull:0 "Appoint Cordell Hull"
 USA_appoint_hull_desc:0 "The courtly Tennessean is a true believer in the power of commerce to bind nations together in peace. His trade agreements and patient diplomacy will draw a reluctant America toward the wider world, and lend the cabinet a steady, internationalist voice."
 USA_appoint_isolationist_state:0 "Appoint an Isolationist"
 USA_appoint_isolationist_state_desc:0 "Let the State Department be run by a man who reads the Neutrality Acts as holy writ and remembers the last war as a swindle of bankers and arms-makers. America's true strength, he insists, lies behind its two great oceans."
 USA_secretary_of_treasury:0 "The Treasury"
 USA_secretary_of_treasury_desc:0 "Whoever holds the purse strings holds the future. The Treasury will decide whether the relief checks keep flowing and the public works keep rising, or whether the budget is balanced upon the back of the New Deal."
 USA_appoint_morgenthau:0 "Appoint Henry Morgenthau"
 USA_appoint_morgenthau_desc:0 "Henry Morgenthau Jr., the President's Dutchess County neighbor and intimate friend, is a New Dealer to the marrow of his bones. He will find the money for relief, for public works, and one day for war itself, and he will spend it without flinching."
 USA_appoint_business_treasury:0 "Appoint a Man of Business"
 USA_appoint_business_treasury_desc:0 "A sound-money man who speaks the easy language of Wall Street, brought in to reassure the markets and the bond-holders. Industry will trust the dollar under his steady hand, but every relief program will now fight for its life at the Treasury's door."
 USA_secretary_of_war:0 "The War Department"
 USA_secretary_of_war_desc:0 "Storm clouds are gathering over the Rhine and the Yangtze, and the War Department must decide how seriously to take them. Does America rearm now, while there is still time, or trust that two oceans and a small professional army will prove shield enough?"
 USA_appoint_stimson:0 "Appoint Henry Stimson"
 USA_appoint_stimson_desc:0 "Henry Stimson, Republican elder statesman, takes up the War Department in open defiance of his own party's isolationists. Grim, principled, and certain that war is coming whether America wills it or not, he will drive rearmament relentlessly forward."
 USA_appoint_woodring:0 "Appoint Harry Woodring"
 USA_appoint_woodring_desc:0 "Harry Woodring of Kansas speaks for the millions who swore 'never again' amid the trenches of 1918. He will keep the army small, the budget lean, and American boys at home, however unready that leaves the Republic should the worst arrive."
 USA_attorney_general:0 "The Department of Justice"
 USA_attorney_general_desc:0 "The Justice Department guards the home front, and in dangerous times its writ runs very wide indeed. Will the Attorney General stand as the conscience of the nation, defending dissent, or as its iron shield, hunting subversion before it can strike?"
 USA_appoint_murphy:0 "Appoint Frank Murphy"
 USA_appoint_murphy_desc:0 "Frank Murphy, the Michigan governor who refused to break the Flint sit-down strike by force of arms, is a crusader for civil liberties and the rights of working men. As Attorney General he will hold the administration to its loftiest ideals."
 USA_appoint_security_ag:0 "Appoint a Security Hawk"
 USA_appoint_security_ag_desc:0 "A hard, watchful man for a hard and watchful hour. He sees saboteurs at the factory gates and will build the files and wiretaps to root them out, though honest dissenters may find the line between treason and mere disagreement growing thin."
 USA_trunk_election_1936:0 "The Election of 1936"
 USA_trunk_election_1936_desc:0 "The first full verdict on the New Deal comes due in November. The President carries every advantage into the contest, yet the Literary Digest swears Governor Landon has the votes, and the cabinet's quarrels have a way of escaping into print."
 USA_trunk_election_1940:0 "The Election of 1940"
 USA_trunk_election_1940_desc:0 "No President has ever asked the country for a third term; Washington set the example and a hundred and forty years have honored it. But France has fallen, Britain stands alone, and millions of Americans are asking whether mid-ocean is any place to change pilots. November will decide more than an office. It will decide what traditions are worth in an age of emergencies."
 USA_trunk_election_1944:0 "The Election of 1944"
 USA_trunk_election_1944_desc:0 "On schedule, as the founders insisted, the Republic returns to the polls. The parties print their posters and the trains carry their candidates, and beneath the argument lies a quieter question: how much longer one man, and one coalition, can carry the country."
 USA_trunk_election_1948:0 "The Election of 1948"
 USA_trunk_election_1948_desc:0 "Nobody gives the President's party a prayer. The pollsters have stopped polling, the columnists have filed their inauguration copy, and Governor Dewey campaigns with the unhurried calm of a man measuring the White House for curtains. The whistle-stops tell a different story, if anyone cared to listen."
 USA_trunk_election_1952:0 "The Election of 1952"
 USA_trunk_election_1952_desc:0 "Twenty years of one coalition, a stalemate abroad, and a country grown weary of emergencies: 1952 is less an election than a changing of the age. The General is courted by both parties, the Governor of Illinois speaks in polished paragraphs, and the suburbs, fat with new prosperity, will render the verdict."
 USA_trunk_infamy:0 "A Date Which Will Live in Infamy"
 USA_trunk_infamy_desc:0 "The bombs have fallen, and the argument is over. Isolationist and interventionist, striker and magnate file behind the flag as the Republic turns, with terrible deliberation, to the business of total war. There is no neutrality left to preserve, only a victory to be organized."
 USA_trunk_shape_of_the_peace:0 "The Shape of the Peace"
 USA_trunk_shape_of_the_peace_desc:0 "The guns have stopped, and the harder work begins. Armies must come home, factories must find peacetime customers, and the men in Washington must decide what kind of world American power has just purchased, and at what continuing price they are prepared to keep it."
 USA_trunk_third_term_crisis:0 "The Third Term Crisis"
 USA_trunk_third_term_crisis_desc:0 "The administration's lawyers have found the arguments and the administration's men have found the votes: the election of 1940 is to be postponed until the emergency passes. Whatever the courts eventually say, something fundamental has been said already, and every chancellery in Europe has heard it."
 USA_trunk_suspended_election:0 "The Suspended Election"
 USA_trunk_suspended_election_desc:0 "With the nation under arms, the government announces that the ballot of 1944 will not be held. The soldiers cannot vote, the argument runs, so no one shall. Martial necessity is a doctrine with no natural stopping place, and the men around the President know it."

 # --- Wing anchors ---
 USA_dem_anchor:0 "The New Deal Coalition"
 USA_dem_anchor_desc:0 "Machine bosses and farm-belt populists, union men and Southern committee barons, professors and precinct captains: Roosevelt's improbable coalition holds the street corner and the statehouse alike. So long as it holds together, the New Deal is not merely a program but a governing majority."
 USA_gop_anchor:0 "The Loyal Opposition"
 USA_gop_anchor_desc:0 "Reduced to a corporal's guard in the Congress, the Grand Old Party endures in the boardrooms, the broadsheets, and the long memory of the small towns. Somebody must keep asking what all of this costs, and who will be left holding the bill."
 USA_rad_anchor:0 "Voices of Discontent"
 USA_rad_anchor_desc:0 "Huey Long promises every man a king's share, Father Coughlin thunders over the radio, and the new industrial unions are learning their strength on the picket line. Millions have concluded that the recovery is too slow, and far too gentle with the men who caused the Crash."
 USA_auth_anchor:0 "The Whispering Gallery"
 USA_auth_anchor_desc:0 "In certain boardrooms and certain barracks it is said, quietly, that the Republic has grown too divided for an age of dictators, and that a firmer hand could set things right inside a year. For now it is only talk. Such talk has toppled republics before."
 USA_mil_anchor:0 "The Arsenal Question"
 USA_mil_anchor_desc:0 "The Army of the United States musters fewer men than Romania's, and its arsenals hold the leftovers of 1918. Whoever rules in Washington, and whatever they believe, the question of American arms will not wait upon politics."

 # --- Democratic wing, 1945-56 (Task 6) ---
 USA_dem_bretton_woods:0 "The Bretton Woods System"
 USA_dem_bretton_woods_desc:0 "Forty-four nations send their delegates to a New Hampshire resort hotel, and in three weeks they reorganize the world's money. The dollar is fixed to gold at thirty-five dollars the ounce; every other currency is fixed to the dollar; and a new International Monetary Fund stands ready to lend to governments that cannot keep their peg. The pound sterling is not abolished, but it is subordinated, and the men at the Bank of England know it. The age of financial nationalism is over, and the age of American-managed globalism has begun, whether the world has quite agreed to it or not."
 USA_dem_united_nations:0 "The United Nations"
 USA_dem_united_nations_desc:0 "The last time the United States was invited to join the concert of nations it sent the invitation back unopened. This time the Senate ratifies the Charter with eighty-nine votes, the United Nations takes up its address in New York, and the Secretary of State begins learning what it means to chair meetings in which the Soviet Union has a permanent veto. The building on the East River is drafty and the translators are overworked, but it is the first machinery ever built for the governance of the whole world, and it is powered chiefly by American money and American faith that the institution will not be needed for very long."
 USA_dem_containment:0 "Containment"
 USA_dem_containment_desc:0 "The long telegram from Moscow runs to eight thousand words, and every word argues the same thing: the Soviet Union is a revolutionary power that cannot be appeased, only resisted. Mr. Kennan's doctrine reaches the desk of every senior official in Washington, where it is debated, edited, simplified, and finally issued as policy. The United States will meet Soviet expansion wherever it appears, at whatever cost, for as long as it takes. The Cold War is not yet a phrase in common usage, but its strategy is now a government memorandum, and the government is already spending to match it."
 USA_dem_fair_deal:0 "The Fair Deal"
 USA_dem_fair_deal_desc:0 "The President has come back from the dead politically, and he intends to use the time. National health insurance, civil rights legislation, federal aid to education, an expansion of Social Security to cover the workers the original act left out: the Fair Deal is the New Deal at full pressure, offered now by a man who has nothing left to lose and a Congress that is not quite sure how to tell him no. Some of it passes and some of it dies in committee, and the historians will argue about which was which, but the direction of the argument is established for a generation."
 USA_dem_truman_doctrine:0 "The Truman Doctrine"
 USA_dem_truman_doctrine_desc:0 "Greece is in civil war and Turkey is under Soviet pressure and the British have told Washington, with the exhausted candor of an empire that can no longer pay its own bills, that they cannot carry either burden past the spring. The President goes before a joint session of Congress and announces that the United States must support free peoples who are resisting subjugation. It is the first time an American president has asked Congress for money to fight someone else's communist insurgency, and the senators know it will not be the last. The check for Greece and Turkey is the smallest item on a bill that will run for decades."
 USA_dem_red_scare_managed:0 "The Loyalty Boards With Limits"
 USA_dem_red_scare_managed_desc:0 "The loyalty review boards are a fact of postwar Washington, and the Attorney General's list of subversive organizations is a bureaucratic inevitability no administration can wish away. What this one can do is run the machinery with a sense of proportion: require actual evidence before an accusation sticks, keep the hearings from becoming public inquisitions, and remind Congress that the Constitution has not been suspended for the duration of the Cold War. The security services are unhappy, the demagogues on Capitol Hill are furious, and the civil libertarians are cautiously satisfied, which is probably the correct distribution of discontent."
 USA_dem_marshall_plan:0 "The Marshall Plan"
 USA_dem_marshall_plan_desc:0 "The Secretary of State goes to Harvard in June and offers, in twelve minutes of quiet prose, to rebuild the economies of any European country willing to participate and account for the money. The offer is extended to the Soviet Union and its neighbors on principle, knowing they will refuse on principle, and they oblige. Sixteen nations accept and send their delegations to Paris to draw up a joint recovery program. Over the next four years thirteen billion dollars flows from the United States Treasury into the factories, railways, and coalfields of Western Europe. The customers are being rebuilt. The question is what they will buy once they are back on their feet."
 USA_dem_nsc68:0 "NSC-68"
 USA_dem_nsc68_desc:0 "The document is classified and runs to sixty-six pages, and its argument is as simple as it is expensive: the Soviet Union is pursuing a program of world domination, it will have a significant nuclear arsenal by 1954, and the United States military budget must treble if the free world is to survive the decade. The Secretary of Defense objects that the country cannot afford it. The Secretary of State argues that the country cannot afford not to. The Soviet test of an atomic device and the opening of the Korean War answer the question before the President has to, and the supplemental appropriations begin moving through the Congress before the summer is out."
 USA_dem_nato:0 "The North Atlantic Treaty"
 USA_dem_nato_desc:0 "For the first time since the French alliance of 1778, the United States commits by treaty to the defense of foreign soil. An attack on one is an attack on all, and all twelve signatories know which of the twelve will actually be expected to deter the Red Army. The skeptics call it an entangling alliance and quote Washington's farewell address; the supporters reply that Washington never faced Stalin, and that the farms of Kansas are only safe if the Rhine is held. The Senate ratifies with eighty-two votes, and a Supreme Commander is dispatched to Paris to organize the defense that everyone hopes will never be tested."
 USA_dem_korea_line:0 "The Thirty-Eighth Parallel"
 USA_dem_korea_line_desc:0 "The line was arbitrary to begin with — the work of two young officers with a National Geographic map on the night of Japan's surrender — and now it is the most important line in the world. The United Nations resolution passes in the Security Council while the Soviet delegate is away from his chair protesting the China seat, and American forces are moving north within the week. The General commanding promises it will be over by Christmas, and the men on the ground, counting the mountains, are not so sure. The line must hold, and the line does hold, and forty thousand Americans who came to hold it do not go home."
 USA_dem_election_52_ike:0 "The General Comes Home"
 USA_dem_election_52_ike_desc:0 "Both parties have courted him and the Democrats have landed him. General of the Army Dwight D. Eisenhower has spent his adult life in government service and declines, absolutely, to call himself a politician, which is the most political thing he could possibly say. He is the commander who won the war in Europe, the Supreme Commander who is organizing the peace, and the one candidate in the field whom nobody can accuse of having made the policy mistakes that landed America in its present discontents. The professionals in both parties regard him with the fondness that professionals reserve for amateurs who happen to be unbeatable."
 USA_dem_election_52_egghead:0 "Eloquence Against the Tide"
 USA_dem_election_52_egghead_desc:0 "The Governor of Illinois did not want the nomination and said so in terms that would have disqualified any other candidate. He drafts his own speeches, speaks in subordinate clauses, and tells audiences what he actually believes about the complexity of the world. The eggheads adore him and the machine politicians are uneasy and the General's grin has not dimmed for a moment, but Adlai Stevenson is asking the voters to think, and sometimes that is enough. The campaign is a masterpiece of political intelligence and a monument to what a democracy can demand of itself when it chooses to."
 USA_dem_new_look:0 "The New Look"
 USA_dem_new_look_desc:0 "The President was a soldier and he knows what soldiers cost, and he has decided that the country cannot afford the army it was fielding and a civil economy too. The New Look is his answer: fewer divisions, more bombers, a larger nuclear stockpile, and the doctrine of massive retaliation to fill the gap between the two. A dollar of deterrence, the budget-cutters explain, buys more security than a dollar of conventional forces. The Joint Chiefs are unhappy, the Europeans are nervous, and the President is firm. More bang for the buck, he says, and the phrase enters the vocabulary of strategy."
 USA_dem_atoms_for_peace:0 "Atoms for Peace"
 USA_dem_atoms_for_peace_desc:0 "The President goes before the General Assembly and offers to contribute American fissionable material to an international pool, administered by the United Nations, for peaceful purposes. It is the first time an American president has addressed the world on the subject of atomic energy without a threat attached, and the hall is genuinely moved. The Soviets are suspicious and the proposal takes years to negotiate into the International Atomic Energy Agency, but the speech itself does something treaties cannot: it establishes that the American government does not regard the atomic bomb as simply the largest artillery shell ever made, but as a thing that requires a different kind of politics."
 USA_dem_saint_lawrence:0 "The Saint Lawrence Seaway"
 USA_dem_saint_lawrence_desc:0 "The project has been proposed and deferred for thirty years while the railroads lobbied against it and Congress demurred. Now the shovels go in and the Great Lakes become a seaway: oceangoing vessels will be able to sail from Duluth to the Atlantic without a single portage, and the industrial heartland of the continent will have a direct passage to the world. The seaway opens in 1959 and the Queen herself comes for the ceremony, and the grain elevators of Minnesota are suddenly within reach of Liverpool."
 USA_dem_interstate:0 "The Interstate Highway System"
 USA_dem_interstate_desc:0 "The General had seen what the Autobahn did for Germany, and the President is not going to let the country that invented the automobile fall behind in the business of roads. The Federal Aid Highway Act authorizes forty-one thousand miles of divided highway across the whole breadth of the Republic, the largest public works program in human history, paid for in gasoline taxes and built to standards that will carry the traffic of the twenty-first century. The suburbs expand along the interchanges, the truck lines displace the railroads, and the American landscape is permanently reorganized around the automobile and the filling station."
 USA_dem_hundred_million_strong:0 "The Affluent Society"
 USA_dem_hundred_million_strong_desc:0 "A hundred and seventy million Americans and the largest economy the world has ever seen: the generation that survived the Depression and won the war is spending the proceeds. The suburbs fill with ranch houses and the garages fill with tail-finned automobiles and the children fill the schools, and a Harvard economist writes a book arguing that the country's chief problem is no longer scarcity but the quality of its abundance. The complaint is a luxury. A nation that can afford to worry about the spiritual cost of its prosperity is a nation that has, by any reasonable measure of history, already won."

 # --- Democratic wing, 1936-44 ---
 USA_dem_second_new_deal:0 "The Second New Deal"
 USA_dem_second_new_deal_desc:0 "The first hundred days saved the banks; this second wave means to save the men. Works progress, rural power, and a federal payroll that reaches into every county: the New Deal stops apologizing for itself and starts building."
 USA_dem_wagner_act:0 "The Wagner Act"
 USA_dem_wagner_act_desc:0 "The right to organize is now the law of the land, with a National Labor Relations Board to make it stick. The companies may keep their lawyers, but the men have got the federal government, and labor peace is suddenly cheaper than the alternative."
 USA_dem_social_security:0 "The Old-Age Compact"
 USA_dem_social_security_desc:0 "A payroll tax, a ledger in Baltimore, and a promise: that no American who has worked a lifetime shall end it in the county poorhouse. It is the quietest revolution Washington has ever enacted, and it will prove the hardest to repeal."
 USA_dem_court_fight:0 "The Court Fight"
 USA_dem_court_fight_desc:0 "Nine old men have been striking down the New Deal statute by statute, and the President proposes to appoint a few young ones to keep them company. The country recoils and the Senate balks - but the Court, reading the election returns, may yet discover that the Constitution permits a minimum wage after all."
 USA_dem_commitment:0 "The Coalition Holds"
 USA_dem_commitment_desc:0 "Machine bosses and miners, professors and precinct captains: every element of the coalition has been paid in full and the contract renewed. Whatever comes - depression, war, or the wearing-out of one extraordinary man - the New Deal is no longer an experiment. It is the government."
 USA_dem_rearmament_politics:0 "The Politics of Preparedness"
 USA_dem_rearmament_politics_desc:0 "Secretary Stimson makes the case in cabinet and the President makes it on the radio: hemispheric defense, idle plants put to work, jobs in the aircraft factories. Rearmament is sold to a peace-minded public one appropriation at a time, and never once called by its name."
 USA_dem_cash_and_carry:0 "Cash and Carry"
 USA_dem_cash_and_carry_desc:0 "The Neutrality Acts stand - amended. Any belligerent may buy American goods, provided it pays in dollars and hauls them home in its own ships. The law is scrupulously impartial, and it happens that only one side of this war has both the gold and a navy."
 USA_dem_destroyers_for_bases:0 "Destroyers for Bases"
 USA_dem_destroyers_for_bases_desc:0 "Fifty old four-stackers, rust and all, traded for ninety-nine-year leases on harbors from Newfoundland to Trinidad. The lawyers call it an executive agreement; the isolationists call it war by installment; the Royal Navy calls it fifty more hulls between the convoys and the wolf packs."
 USA_dem_lend_lease:0 "Lend-Lease"
 USA_dem_lend_lease_desc:0 "When your neighbor's house is on fire, the President explains, you lend him your garden hose and settle accounts afterward. By act of Congress the arsenal opens its books to the democracies, and the dollar sign, as promised, is retired for the duration."
 USA_dem_arsenal_of_democracy:0 "The Arsenal of Democracy"
 USA_dem_arsenal_of_democracy_desc:0 "The assembly lines that built sedans learn to build bombers, and the cost-plus contract converts skeptical boardrooms into war plants by the week. No nation in history has retooled so much so fast - and the great machine is only beginning to turn."
 USA_dem_wpb:0 "The War Production Board"
 USA_dem_wpb_desc:0 "One board, one chairman, and priority numbers worth more than money: Washington takes the entire industrial economy into receivership for the duration. Civilian automobile production ends by order, and nobody in Detroit doubts what comes off the lines instead."
 USA_dem_osrd:0 "Science Mobilized"
 USA_dem_osrd_desc:0 "Dr. Bush's Office of Scientific Research and Development puts the universities under contract and the laboratories on war time. Radar, proximity fuzes, penicillin by the tank-car: the war will be won by production, but it will be shortened by physics."
 USA_dem_atlantic_charter:0 "A Meeting at Placentia Bay"
 USA_dem_atlantic_charter_desc:0 "In a fog-bound Newfoundland anchorage the President and the Prime Minister exchange hymns, courtesies, and eight common principles for a world neither yet governs. America is formally at peace; her war aims, curiously, are already in print."
 USA_dem_tehran:0 "The Big Three"
 USA_dem_tehran_desc:0 "For four days in the Soviet legation at Tehran the President sits between empires and plays honest broker of the alliance: a second front in France, agreed; a war on Japan, promised; the shape of the world to come, sketched over dinner and deferred."
 USA_dem_yalta:0 "Yalta"
 USA_dem_yalta_desc:0 "In a looted Crimean palace the three victors divide what their armies already hold. Poland is argued past midnight, the United Nations is purchased with two extra votes, and a tired President wagers that the word of Marshal Stalin will survive the peace it has just designed."
 USA_dem_double_v:0 "The Double V"
 USA_dem_double_v_desc:0 "Victory abroad and victory at home: the slogan travels from the Pittsburgh Courier to the shipyard gates. The war plants open to all hands by executive order, and a million new workers take up labor the emergency no longer permits the country to refuse."
 USA_dem_gi_bill_groundwork:0 "Repaying the Uniform"
 USA_dem_gi_bill_groundwork_desc:0 "Twelve million men will come home expecting something better than the bonus marches their fathers got. College tuition, home loans, a year of readjustment pay: the Republic quietly drafts the largest investment in its own citizens ever put to paper."
 USA_dem_president_is_dead:0 "The President Is Dead"
 USA_dem_president_is_dead_desc:0 "At Warm Springs, Georgia, in the first spring of victory, the only President a generation of Americans can remember slips away in an afternoon. The work of the age does not pause for grief: the oath waits in Washington, and the haberdasher must take it."

 # ============================ CABINET MEMBERS ============================

 USA_cabinet_cordell_hull:0 "Cordell Hull"
 USA_cabinet_cordell_hull_desc:0 "Secretary of State. A patient, courtly internationalist who believes that free trade and open dialogue are the surest roads to a lasting peace."
 USA_cabinet_isolationist_state:0 "An Isolationist Secretary"
 USA_cabinet_isolationist_state_desc:0 "Secretary of State. He keeps America aloof from foreign quarrels, hardening the nation against any drift toward another European war."
 USA_cabinet_morgenthau:0 "Henry Morgenthau Jr."
 USA_cabinet_morgenthau_desc:0 "Secretary of the Treasury. A devoted New Dealer and the President's close friend, who finances reform and public works without flinching."
 USA_cabinet_business_treasury:0 "A Man of Business"
 USA_cabinet_business_treasury_desc:0 "Secretary of the Treasury. A friend of industry and sound money who reassures the markets and streamlines the nation's factories."
 USA_cabinet_stimson:0 "Henry Stimson"
 USA_cabinet_stimson_desc:0 "Secretary of War. A resolute Republican interventionist, preparing the army for the storm he is utterly certain is coming."
 USA_cabinet_woodring:0 "Harry Woodring"
 USA_cabinet_woodring_desc:0 "Secretary of War. A heartland isolationist who keeps the military lean, the budget modest, and American boys at home."
 USA_cabinet_murphy:0 "Frank Murphy"
 USA_cabinet_murphy_desc:0 "Attorney General. A crusading defender of civil liberties and the rights of labor who holds the administration to its highest ideals."
 USA_cabinet_security_ag:0 "A Security Hawk"
 USA_cabinet_security_ag_desc:0 "Attorney General. A hard, watchful man who places the security of the Republic above the comforts of dissent."

 # ============================ NATIONAL SPIRITS ============================

 USA_the_second_new_deal_spirit:0 "The Second New Deal"
 USA_the_second_new_deal_spirit_desc:0 "A renewed commitment to reform drives construction forward and restores the people's confidence in the government."
 USA_managed_economy_spirit:0 "A Managed Economy"
 USA_managed_economy_spirit_desc:0 "Coordinated industrial policy keeps the nation's factories running at their full and tireless capacity."
 USA_the_inner_circle_spirit:0 "The Inner Circle"
 USA_the_inner_circle_spirit_desc:0 "A complete and trusted cabinet amplifies the President's authority and steadies the entire ship of state."
 USA_progressive_coalition_spirit:0 "Progressive Coalition"
 USA_progressive_coalition_spirit_desc:0 "The reformers hold the reins of power, and the hard-won promise of the New Deal is secure for a generation."
 USA_conservative_coalition_spirit:0 "Conservative Coalition"
 USA_conservative_coalition_spirit_desc:0 "The Old Guard restores order and the quiet confidence of enterprise to the affairs of the nation."
 USA_economic_bill_of_rights_spirit:0 "Economic Bill of Rights"
 USA_economic_bill_of_rights_spirit_desc:0 "Economic security is now the acknowledged birthright of every citizen, binding the nation together in common purpose."
 USA_cooperative_commonwealth_spirit:0 "Cooperative Commonwealth"
 USA_cooperative_commonwealth_spirit_desc:0 "The great industries are turned to the service of the many, and the whole social order is remade upon new foundations."
 USA_old_republic_spirit:0 "The Old Republic Restored"
 USA_old_republic_spirit_desc:0 "Limited government and free enterprise return to their rightful place at the very heart of American life."
 USA_american_caesar_spirit:0 "The American Caesar"
 USA_american_caesar_spirit_desc:0 "A strong executive hand imposes order upon a fractured nation, at the heavy cost of the old constitutional restraints."
 USA_scientific_establishment_spirit:0 "A Scientific Establishment"
 USA_scientific_establishment_spirit_desc:0 "A coordinated national research effort speeds American science relentlessly forward."
 USA_operations_research_spirit:0 "Operations Research"
 USA_operations_research_spirit_desc:0 "Scientific method applied to war and industry alike sharpens both research and production."
 USA_total_mobilization_spirit:0 "Total Mobilization"
 USA_total_mobilization_spirit_desc:0 "The full might of American industry and manpower is committed without reservation to the war effort."
 USA_atomic_monopoly_spirit:0 "Atomic Monopoly"
 USA_atomic_monopoly_spirit_desc:0 "America alone commands the secrets of the atom, and a wary world treads very carefully indeed."
 USA_lend_lease_spirit:0 "Arsenal of the Democracies"
 USA_lend_lease_spirit_desc:0 "American war material flows freely to friends across the seas at little political cost at home."
 USA_postwar_planning_spirit:0 "Postwar Planning"
 USA_postwar_planning_spirit_desc:0 "Careful preparation for the peace strengthens the President's hand both at home and abroad."
 USA_bretton_woods_spirit:0 "Bretton Woods System"
 USA_bretton_woods_spirit_desc:0 "The dollar anchors a stable world economy, built deliberately to American advantage."
 USA_united_nations_spirit:0 "The United Nations"
 USA_united_nations_spirit_desc:0 "A standing forum for the nations of the world lends American diplomacy an unmatched reach."
 USA_marshall_plan_spirit:0 "The Marshall Plan"
 USA_marshall_plan_spirit_desc:0 "Generous American aid rebuilds a shattered world and wins the nation lasting friends."
 USA_iron_curtain_spirit:0 "Cold War Vigilance"
 USA_iron_curtain_spirit_desc:0 "A wary nation steels itself for the long struggle against the new rival across the divide."
 USA_containment_spirit:0 "Containment"
 USA_containment_spirit_desc:0 "America stands ever ready to hold the line wherever the rival power presses outward."
 USA_return_to_normalcy_spirit:0 "Return to Normalcy"
 USA_return_to_normalcy_spirit_desc:0 "A contented nation turns gratefully to peace and prosperity at home."
 USA_demobilization_spirit:0 "Demobilization"
 USA_demobilization_spirit_desc:0 "The armies come home and the economy turns to the long-awaited abundance of peace."
 USA_permanent_establishment_spirit:0 "Permanent Military Establishment"
 USA_permanent_establishment_spirit_desc:0 "A standing military and its supporting industry keep America ready for any threat that may come."
 USA_american_century_spirit:0 "The American Century"
 USA_american_century_spirit_desc:0 "Industry, ideals, and steady leadership together place America at the very summit of the world."

 # --- Democratic wing spirits (Task 6) ---
 USA_marshall_outlays_spirit:0 "Marshall Outlays"
 USA_marshall_outlays_spirit_desc:0 "Thirteen billion dollars is flowing toward Europe over four years, and the Treasury is bearing the weight. The investment will be repaid in prosperity and in gratitude, but the bill comes first."
 USA_nsc68_rearmament_spirit:0 "NSC-68 Rearmament"
 USA_nsc68_rearmament_spirit_desc:0 "The defense budget has been trebled, the draft boards are busy, and the factories that retooled for consumer goods are retooling again. The Cold War is being waged at peacetime, and it costs nearly as much."
 USA_nato_spirit:0 "The Atlantic Alliance"
 USA_nato_spirit_desc:0 "For the first time in its history the Republic is committed by treaty to the defense of European soil. The commitment costs money and men and a permanent Supreme Headquarters, but it buys something the Atlantic Ocean alone cannot: deterrence by guarantee."
 USA_new_look_spirit:0 "The New Look"
 USA_new_look_spirit_desc:0 "The bomber force is built up, the nuclear stockpile is growing, and the conventional divisions are being thinned out. More bang for the buck is the doctrine, and the budget committees have no objection to the bang."
 USA_hundred_million_strong_spirit:0 "The Affluent Society"
 USA_hundred_million_strong_spirit_desc:0 "The highways are full, the suburbs are growing, and the economy is the largest and most productive in the history of the world. The country has arrived at the summit it has been climbing toward since 1936, and it is taking a moment to look around."

 # --- Democratic wing spirits (Task 5) ---
 USA_labor_peace_spirit:0 "Labor Peace"
 USA_labor_peace_spirit_desc:0 "With the right to organize written into law, the great industrial unions settle their quarrels at the bargaining table rather than the factory gate."
 USA_atlantic_bases_spirit:0 "Atlantic Bases"
 USA_atlantic_bases_spirit_desc:0 "Ninety-nine-year leases from Argentia to Trinidad push America's ocean frontier a thousand miles eastward and give the fleet harbors it never had to build."
 USA_lend_lease_capacity_spirit:0 "Lend-Lease Capacity"
 USA_lend_lease_capacity_spirit_desc:0 "The machinery of lending is built: the depots, manifests, and shipping schedules that can arm half the world without a declaration of war."
 USA_war_aims_spirit:0 "The Atlantic Charter"
 USA_war_aims_spirit_desc:0 "Eight plain principles give the coming struggle an American meaning: self-government restored, the seas kept free, and freedom from fear and want for victor and vanquished alike."

 # ============================ EVENTS ============================

 # --- The Election of 1936 (usa_cabinet.100-104) ---
 usa_cabinet.100.t:0 "The Election of 1936"
 usa_cabinet.100.d:0 "The campaign of 1936 has been less an argument than a referendum. Governor Alf Landon of Kansas, the Republicans' amiable sunflower, promises sound money and a balanced budget; the President answers that the forces of organized money are unanimous in their hate for him, and that he welcomes their hatred. Now the ballots are cast, and the country sits up by the radio to learn what manner of mandate the next four years will carry."
 usa_cabinet.100.a:0 "Campaign on the New Deal, and let them count the landslide."
 usa_cabinet.100.b:0 "Let the cabinet's record speak for itself."
 usa_cabinet.100.c:0 "The old parties have failed. Back the third-party surge."
 usa_cabinet.101.t:0 "Roosevelt Triumphant"
 usa_cabinet.101.d:0 "It is not a victory but an avalanche: forty-six states of forty-eight, and the greatest electoral margin since Monroe ran unopposed. The President has his mandate, the cabinet keeps its seats, and the Republic has answered, emphatically, that the New Deal shall go on."
 usa_cabinet.101.a:0 "Four more years."
 usa_cabinet.102.t:0 "A House Divided"
 usa_cabinet.102.d:0 "The third-party ticket has not won the White House, but it has done something nearly as remarkable: it has broken the arithmetic. With the popular vote split three ways, the President returns to Washington with a plurality, a hostile press, and a Congress in open ferment. Men who only whispered last year now speak aloud; the old party system is cracking, and no one can yet say what will crawl out from beneath it."
 usa_cabinet.102.a:0 "The center cannot hold forever."
 usa_cabinet.103.t:0 "Landon!"
 usa_cabinet.103.d:0 "The Literary Digest was right after all. The cabinet's open feuding and the Old Guard's quiet money have done what no Republican orator could: Governor Alfred M. Landon of Kansas is President-elect of the United States. The sunflower buttons come out of dresser drawers, Wall Street toasts the restoration, and a stunned New Deal apparatus begins packing its boxes."
 usa_cabinet.103.a:0 "The business of America is business once more."
 usa_cabinet.104.t:0 "A New Term Begins"
 usa_cabinet.104.d:0 "On a gray January morning the Chief Justice administers the oath upon the Capitol steps, and the Republic, whatever its quarrels, once more hands power peaceably from one term to the next. The crowds disperse, the bands pack away their brass, and the long work of governing resumes."
 usa_cabinet.104.a:0 "Hail to the Chief."

 # --- The Election of 1940 (usa_cabinet.110-114) ---
 usa_cabinet.110.t:0 "The Election of 1940"
 usa_cabinet.110.d:0 "Paris has fallen, London burns by night, and in America the oldest unwritten law of the Republic is on the ballot. The President's men organize a conspicuously spontaneous draft in Chicago; Wendell Willkie, a registered Democrat eighteen months ago, storms the Republican convention on a wave of amateurs; and the country must decide whether tradition or the emergency is master."
 usa_cabinet.110.a:0 "No time to change horses. A third term."
 usa_cabinet.110.b:0 "Send in the amateur: back the Willkie crusade."
 usa_cabinet.110.c:0 "Let the country make up its own mind."
 usa_cabinet.111.t:0 "The Third Term"
 usa_cabinet.111.d:0 "It is done: for the first time since the founding, the same hand will hold the office a third time. The margins are comfortable but not crushing, and even some who voted for him did so uneasily. The two-term tradition was a fence, and the fence is down; what else the emergency may yet justify, no one cares to guess aloud."
 usa_cabinet.111.a:0 "The emergency commands; the people consent."
 usa_cabinet.112.t:0 "Willkie!"
 usa_cabinet.112.d:0 "The amateurs have done it. Wendell Willkie, who never held public office in his life, has talked himself hoarse in five hundred towns and talked his way into the White House. Wall Street celebrates carefully, the isolationists celebrate prematurely, and the New Deal apparatus begins, for the first time in eight years, packing its boxes."
 usa_cabinet.112.a:0 "One world, and one new President."
 usa_cabinet.113.t:0 "The Crusade Falls Short"
 usa_cabinet.113.d:0 "The barnstorming made it close, closer than any challenger has come in a decade, but close is not the presidency. The President returns to Washington with a narrower mandate and a hoarse, exhausted opposition. The third term is now a fact; what it costs has merely been deferred."
 usa_cabinet.113.a:0 "The champ keeps the title."
 usa_cabinet.114.t:0 "The Center Gives Way"
 usa_cabinet.114.d:0 "The returns make no familiar pattern: the old parties have been beaten in precincts they have owned since Appomattox. Something new is loose in the Republic, a politics of marching columns and meeting halls rather than smoke-filled rooms, and the men who manage the old order read the county totals with cold hands."
 usa_cabinet.114.a:0 "The people have found their voice."
 usa_cabinet.114.b:0 "The hour produces the man."
 usa_cabinet.114.c:0 "The republic endures."

 # --- The Election of 1944 (usa_cabinet.120-124) ---
 usa_cabinet.120.t:0 "The Election of 1944"
 usa_cabinet.120.d:0 "On schedule, as the Constitution insists, the Republic returns to the polls. The President's men speak of work left unfinished; Governor Thomas E. Dewey of New York offers brisk, modern management in place of tired improvisation; and beyond the bunting a weary country weighs whether twelve years of one voice is constancy or merely habit."
 usa_cabinet.120.a:0 "Stay the course. A fourth term."
 usa_cabinet.120.b:0 "Time for fresh blood: back Dewey."
 usa_cabinet.120.c:0 "Let the country make up its own mind."
 usa_cabinet.121.t:0 "The Fourth Term"
 usa_cabinet.121.d:0 "Four terms. The phrase would have stopped conversation a decade ago; now it is merely the news. The coalition holds, older and thinner, like its chief, and the opposition begins to grasp that it is no longer running against a man but against an era."
 usa_cabinet.121.a:0 "Again, and still."
 usa_cabinet.122.t:0 "Dewey Takes the Prize"
 usa_cabinet.122.d:0 "Precision has beaten poetry. Governor Dewey's machine-tooled campaign never raised its voice and never missed a county chairman, and the twelve-year reign is over. The transition is correct, even cordial; the New Deal's monuments will be audited rather than demolished, or so the new men say."
 usa_cabinet.122.a:0 "Efficiency takes the oath."
 usa_cabinet.123.t:0 "The Governor Falls Short"
 usa_cabinet.123.d:0 "The Governor ran a faultless campaign and lost anyway. The coalition's roots proved deeper than its fatigue, and the prosecutor's precision never quite warmed into affection. The administration continues, but it governs a country that very nearly voted for somebody else."
 usa_cabinet.123.a:0 "Four more years, once more."
 usa_cabinet.124.t:0 "The Old Parties Repudiated"
 usa_cabinet.124.d:0 "The two old parties spent the autumn arguing with one another and discovered in November that the country had stopped listening to both. The movements have come in from the margins with their own slates, their own songs, and their own ideas about what the Republic owes its people, and the count is not even close."
 usa_cabinet.124.a:0 "The people have found their voice."
 usa_cabinet.124.b:0 "The hour produces the man."
 usa_cabinet.124.c:0 "The republic endures."

 # --- The Election of 1948 (usa_cabinet.130-134; option four uses .e) ---
 usa_cabinet.130.t:0 "The Election of 1948"
 usa_cabinet.130.d:0 "Every poll, every columnist, and every betting parlor agrees the thing is decided; the only argument is the size of Governor Dewey's mandate. The President alone declines the verdict, whistle-stopping through the small towns and giving hell to the do-nothing Congress, while Henry Wallace's Gideon's Army sings on the party's ruined left flank."
 usa_cabinet.130.a:0 "Give 'em hell. The whistle-stops know something the pollsters don't."
 usa_cabinet.130.b:0 "The polls have it right: it is Dewey's year."
 usa_cabinet.130.c:0 "Let the country make up its own mind."
 usa_cabinet.130.e:0 "Gideon's Army marches: back Wallace."
 usa_cabinet.131.t:0 "DEWEY DEFEATS TRUMAN"
 usa_cabinet.131.d:0 "The headline is already printed, and it is already wrong. The morning editions proclaim the Governor's triumph while the farm belt and the trainmen quietly finish electing the haberdasher, and by dawn the President is holding the Tribune aloft, grinning like a man who has drawn to an inside straight. The experts will be apologizing for years."
 usa_cabinet.131.a:0 "That ain't the way I heard it."
 usa_cabinet.132.t:0 "President Dewey"
 usa_cabinet.132.d:0 "This time the pollsters were right. The Governor's careful arithmetic holds from Maine to California, and the longest reign in the Republic's history ends not with a crash but with a concession telegram. The new administration arrives with binders, schedules, and a firm intention to prove that competence is a political philosophy."
 usa_cabinet.132.a:0 "The era of good management."
 usa_cabinet.133.t:0 "Gideon's Army"
 usa_cabinet.133.d:0 "It was supposed to be a protest vote, and then the protest kept growing. Henry Wallace has carried the industrial belt the experts swore would never bolt, and the century of the common man has arrived a half-century ahead of schedule. The old parties still hold the Congress and the courts, and they intend, very firmly, to be consulted."
 usa_cabinet.133.a:0 "The common man's century begins."
 usa_cabinet.134.t:0 "The Man on Horseback"
 usa_cabinet.134.d:0 "Order, the winning ticket promised, simply order, and a country exhausted by emergencies voted for it without reading the fine print. The victory parades have an unfamiliar cadence, and the men around the President-elect speak of mandates in a way that makes old senators check the locks on the Constitution."
 usa_cabinet.134.a:0 "Order, at any price."

 # --- The Election of 1952 (usa_cabinet.140-144) ---
 usa_cabinet.140.t:0 "The Election of 1952"
 usa_cabinet.140.d:0 "Both parties spent the spring courting the same man, and one of them has him: the General, home from his commands with a grin the cameras love and a distaste for politics the voters love better. Against him stands the Governor of Illinois, brilliant, ironic, and visibly outnumbered. Twenty years of one era are on the table."
 usa_cabinet.140.a:0 "Draft the General."
 usa_cabinet.140.b:0 "Eloquence over medals: back Stevenson."
 usa_cabinet.140.c:0 "Let the country make up its own mind."
 usa_cabinet.141.t:0 "I Like Ike"
 usa_cabinet.141.d:0 "The avalanche was visible by nine o'clock: state after state falling to a man whose entire platform fit on a campaign button. The General has no enemies he cares to name and no debts he cares to honor, and after twenty years the old era ends gently, smiling, by acclamation."
 usa_cabinet.141.a:0 "The General takes command."
 usa_cabinet.142.t:0 "Madly for Adlai"
 usa_cabinet.142.d:0 "The eggheads, the precinct captains, and just enough of everyone else: the Governor has done what the arithmetic said could not be done. He won by treating the voters as adults, and the voters, to the lasting astonishment of the professionals, returned the compliment."
 usa_cabinet.142.a:0 "Let's talk sense to the American people."
 usa_cabinet.144.t:0 "The Old Order Overturned"
 usa_cabinet.144.d:0 "Under the prosperity, it turns out, the anger was still there. The movements the professionals wrote off as wartime fevers have carried the day outright, and the United States has elected a government that intends to be remembered as a founding, not an administration."
 usa_cabinet.144.a:0 "The future arrives ahead of schedule."
 usa_cabinet.144.b:0 "Strength, and no apologies."
 usa_cabinet.144.c:0 "The republic endures."

 # --- Shared inauguration flavour ---
 usa_cabinet.149.t:0 "The Torch Passes"
 usa_cabinet.149.d:0 "On a cold January noon the oath is administered upon the Capitol steps, thirty-five words that have outlasted every storm yet raised against them. The bands play, the crowds thin, the file boxes move through the corridors of the executive departments, and the Republic once again hands its immense and dangerous power from one set of hands to another."
 usa_cabinet.149.a:0 "So help me God."

 # --- The authoritarian on-ramps (usa_cabinet.200-201) ---
 usa_cabinet.200.t:0 "The Third Term Crisis"
 usa_cabinet.200.d:0 "The announcement is read at noon from the steps of the Justice Department: in view of the emergency, the November election is postponed by executive finding, indefinitely. Half the Congress calls it treason and the other half calls it prudence; three governors refuse to comply; and on the streets of Washington, for the first time in living memory, soldiers guard a government against its own citizens."
 usa_cabinet.200.a:0 "The emergency is master now."
 usa_cabinet.200.b:0 "Step back from the brink. The Republic is older than any of us."
 usa_cabinet.201.t:0 "The Suspended Election"
 usa_cabinet.201.d:0 "There will be no ballot this year. The proclamation cites the war powers, the impossibility of a soldiers' vote, and the manifest will of the people as already expressed; the Attorney General's opinion runs to forty pages and persuades no one who was not persuaded already. The courts adjourn for an indefinite recess. The Republic now runs on habit, and on the army."
 usa_cabinet.201.a:0 "The state must hold, whatever else falls."
 usa_cabinet.201.b:0 "Reverse course. Announce the ballot of 1948 now."

 # --- The Truman succession (usa_cabinet.205) ---
 usa_cabinet.205.t:0 "The President Is Dead"
 usa_cabinet.205.d:0 "The flash comes up from Warm Springs in the late afternoon: Franklin Delano Roosevelt, thirty-second President of the United States, is dead of a cerebral hemorrhage in the thirteenth year of his presidency. In Washington the cabinet gathers in the dusk, a Bible is borrowed from a desk drawer, and the enormous machinery of the war does not stop for so much as an hour while the country learns to say a new name."
 usa_cabinet.205.a:0 "Mr. Truman takes the oath."
 usa_cabinet.205.b:0 "Wallace was kept on the ticket after all. The torch passes left."

 # --- The Marshall Plan (usa_cabinet.251) ---
 usa_cabinet.251.t:0 "The European Recovery Programme"
 usa_cabinet.251.d:0 "The Secretary of State has offered American money to any European nation that will draw up a rational recovery program and submit to American accounting. The Soviets have called it dollar imperialism and declined on behalf of their neighbors; sixteen others have said yes, and their delegations are assembled in Paris. The question now is how much of the programme America is willing to fund at full scale, and whether the Congress will pass the appropriations before the French elections decide the matter for everyone."
 usa_cabinet.251.a:0 "Full programme. Rebuild the customers."
 usa_cabinet.251.b:0 "Partial commitment. Spend what the Congress will bear."
 usa_cabinet.251.c:0 "No eligible recipients. The money stays home."

 # --- Era flavour (usa_cabinet.250-299) ---
 usa_cabinet.250.t:0 "The Switch in Time"
 usa_cabinet.250.d:0 "Mr. Justice Roberts has crossed the aisle without leaving his chair: the minimum wage stands, the Wagner Act stands, and the court-packing bill dies quietly in committee, having accomplished everything it threatened. The President has lost the battle in the Senate and discovers, reading the morning's opinions, that he has won the Constitution."
 usa_cabinet.250.a:0 "A switch in time saved nine."


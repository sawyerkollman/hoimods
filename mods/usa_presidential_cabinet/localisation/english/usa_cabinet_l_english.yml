l_english:

 # ============================ FOCUSES ============================

 # --- Economic spine ---
 USA_a_nation_rebuilds:0 "A Nation Rebuilds"
 USA_a_nation_rebuilds_desc:0 "The worst of the Great Depression has passed, but one American worker in six is still idle and faith in the system runs dangerously thin. The federal government must steady the recovery, keep the banks solvent, and prove that democracy can still deliver where lesser nations have surrendered to dictators. Every branch of policy that follows rests on the foundation we pour now."
 USA_relief_programs:0 "Relief Programs"
 USA_relief_programs_desc:0 "The WPA, the CCC, and the PWA have already set millions of idle hands to honest work, raising schools, bridges, and post offices from coast to coast. Expanding direct relief will blunt the sharpest edge of poverty, restore the people's confidence, and quietly assemble the skilled workforce and infrastructure that a future war economy will one day demand."
 USA_public_works:0 "Public Works"
 USA_public_works_desc:0 "From the Tennessee Valley to the Grand Coulee, monumental dams and power lines are wiring an entire continent for the modern age. A nation knit together by concrete, copper, and cheap electricity is one whose factories will never want for power when at last the time comes to build in deadly earnest."
 USA_the_second_new_deal:0 "The Second New Deal"
 USA_the_second_new_deal_desc:0 "The first New Deal saved the patient; the second will remake him. Wagner Act protections for organized labor, sweeping social insurance, and a permanent federal hand upon the economic tiller are meant to outlast this administration entirely, if the Supreme Court and the conservative coalition in Congress can be faced down. The old order will not go quietly into the night."
 USA_social_security_expansion:0 "Social Security Expansion"
 USA_social_security_expansion_desc:0 "No American who has given a lifetime of honest labor should face old age, sickness, or sudden unemployment in destitution. Broadening the safety net wins the lasting loyalty of millions and emboldens the progressive wing of the party, who will soon expect a far louder voice at the cabinet table to come."
 USA_industrial_relations:0 "Industrial Relations"
 USA_industrial_relations_desc:0 "Sit-down strikes and pitched battles at the factory gates have cost the nation dearly in lost production. Bring labor and management to the same table under federal mediation, for a workforce that shares in the prosperity it creates is the one truly unshakeable bedrock of American industrial might."
 USA_a_managed_economy:0 "A Managed Economy"
 USA_a_managed_economy_desc:0 "The Depression taught a brutal lesson: left wholly to itself, the free market can starve a people atop full granaries. Planning boards, federal investment, and a coordinated industrial policy will keep the great engines of production turning at full song, and ready to be redirected from automobiles to tanks at a moment's notice."

 # --- The Brain Trust / Cabinet ---
 USA_the_brain_trust:0 "The Brain Trust"
 USA_the_brain_trust_desc:0 "Franklin Roosevelt does not govern alone. He governs through a 'Brain Trust' of professors, lawyers, and loyalists, and through the cabinet secretaries who command the great departments of state. The men you raise into this inner circle will counsel the President, run the bureaucracy, and quietly wage a war among themselves between progressive reformers and the conservative Old Guard. Assemble that circle with care, for its balance will decide which America emerges from the gathering storm."
 USA_secretary_of_state:0 "The State Department"
 USA_secretary_of_state_desc:0 "Foggy Bottom speaks for America to the world, and the Secretary of State sets the tone of its voice. In an age of dictators on the march, will that voice call for engagement and collective security, or insist that Europe's ancient blood feuds are no concern of ours? The answer will color every alliance and every war still to come."
 USA_appoint_hull:0 "Appoint Cordell Hull"
 USA_appoint_hull_desc:0 "Cordell Hull, the courtly Tennessean, is the longest-serving Secretary of State in the nation's history and a true believer in the power of commerce to bind nations together in peace. His reciprocal trade agreements and patient diplomacy will draw a reluctant America out of its shell toward the wider world, and lend the cabinet a steady, internationalist, and reform-minded voice."
 USA_appoint_isolationist_state:0 "Appoint an Isolationist"
 USA_appoint_isolationist_state_desc:0 "Let the State Department be run by a man who reads the Neutrality Acts as holy writ, who believes the last war was a swindle of bankers and arms-makers and that the next will prove no different. America's true strength, he insists, lies behind its two great oceans, in minding its own hemisphere and leaving the Old World to stew in its own poison."
 USA_secretary_of_treasury:0 "The Treasury"
 USA_secretary_of_treasury_desc:0 "Whoever holds the purse strings holds the future. The Treasury will decide whether the relief checks keep flowing and the public works keep rising, or whether the budget is balanced upon the back of the New Deal. It is the quiet battlefield upon which the entire domestic program is ultimately won or lost."
 USA_appoint_morgenthau:0 "Appoint Henry Morgenthau"
 USA_appoint_morgenthau_desc:0 "Henry Morgenthau Jr., gentleman farmer of Dutchess County and the President's own neighbor and intimate friend, is a New Dealer to the marrow of his bones. He will find the money for relief, for public works, and one day for war itself, and he will spend it without flinching, anchoring the progressive bloc squarely at the heart of the cabinet."
 USA_appoint_business_treasury:0 "Appoint a Man of Business"
 USA_appoint_business_treasury_desc:0 "A sound-money man who speaks the easy language of Wall Street and the country club, brought in to reassure the markets and the bond-holders. Industry will trust the dollar under his steady hand and expand with confidence, but from this day forward every relief program will have to fight for its very life at the Treasury's door."
 USA_secretary_of_war:0 "The War Department"
 USA_secretary_of_war_desc:0 "Storm clouds are gathering over the Rhine and the Yangtze, and the War Department must decide how seriously to take them. Does America rearm now, while there is still precious time to prepare, or trust that two oceans and a small professional army will prove shield enough? The Secretary's answer will forge the very army that fights the coming war."
 USA_appoint_stimson:0 "Appoint Henry Stimson"
 USA_appoint_stimson_desc:0 "Henry Stimson, a Republican elder statesman who served Taft and Hoover before him, takes up the War Department in open defiance of his own party's isolationists. Grim, principled, and utterly certain that war is coming whether America wills it or not, he will drive rearmament relentlessly forward and bend the whole cabinet toward the President's hardening resolve."
 USA_appoint_woodring:0 "Appoint Harry Woodring"
 USA_appoint_woodring_desc:0 "Harry Woodring of Kansas speaks for the millions who swore 'never again' amid the trenches of 1918. He will keep the army small, the budget lean, and American boys clear of foreign quarrels, a comfort to the heartland even as it leaves the nation perilously unready should the very worst arrive on its shores."
 USA_attorney_general:0 "The Department of Justice"
 USA_attorney_general_desc:0 "The Justice Department guards the home front, and in dangerous times its writ runs very wide indeed. Will the Attorney General stand as the conscience of the nation, defending dissent and the rights of the accused, or as its iron shield, hunting subversion and fifth columns before they can strike? The very character of wartime America hangs upon the answer."
 USA_appoint_murphy:0 "Appoint Frank Murphy"
 USA_appoint_murphy_desc:0 "Frank Murphy, the former governor of Michigan who refused to break the Flint sit-down strikers by force of arms, is a Catholic crusader for civil liberties and the rights of working men. As Attorney General he will hold the administration to its loftiest ideals, found a Civil Liberties Unit within the Department, and give the progressives a fierce champion at the cabinet table."
 USA_appoint_security_ag:0 "Appoint a Security Hawk"
 USA_appoint_security_ag_desc:0 "A hard, watchful man for a hard and watchful hour. He sees spies in the union halls and saboteurs at the factory gates, and he will build the files, the wiretaps, and the task forces to root them out. The Republic will be guarded zealously from within, though honest dissenters may find the line between treason and mere disagreement growing thin."
 USA_the_inner_circle:0 "The Inner Circle"
 USA_the_inner_circle_desc:0 "The last chair is filled and the inner circle stands complete. These are the men who will sit with the President through the long nights of crisis, each pressing his own vision of the nation's destiny, each owing his place at the table to you. Whether they pull toward reform or restraint, they now move as the very machinery of American power, and the whole world will feel the weight of their decisions."
 USA_progressive_ascendancy:0 "Progressive Ascendancy"
 USA_progressive_ascendancy_desc:0 "The reformers have won the long, patient struggle within the cabinet. There will be no retreat from the New Deal now; instead it will be carried further than Roosevelt himself once dared, toward a nation that guarantees its people not merely liberty but genuine security. The conservative coalition lies broken, and a new American settlement is suddenly within reach."
 USA_conservative_resurgence:0 "Conservative Resurgence"
 USA_conservative_resurgence_desc:0 "The Old Guard has reasserted its grip upon the levers of power. The alphabet agencies will be reined in, the budget disciplined, and the wilder experiments of the past decade quietly rolled back in favor of order, enterprise, and the old verities that built the country. Business breathes easier at last, and the reformers find themselves out in the cold."
 USA_economic_bill_of_rights:0 "An Economic Bill of Rights"
 USA_economic_bill_of_rights_desc:0 "In his message to the Congress the President names a second Bill of Rights: the right to a useful job, a decent home, adequate medical care, a good education, and protection from the fears of old age and want. To enshrine economic security as the birthright of every citizen is to redefine what the word freedom itself shall mean in America."
 USA_a_cooperative_commonwealth:0 "A Cooperative Commonwealth"
 USA_a_cooperative_commonwealth_desc:0 "A few within the movement dream past mere reform toward outright transformation: an America where the commanding heights of industry answer to the many rather than the few, where the cooperative supplants the corporation as the engine of national life. It is a road no American president has ever dared to walk, and the powers that be will not surrender it without a bitter fight."
 USA_restore_the_old_republic:0 "Restore the Old Republic"
 USA_restore_the_old_republic_desc:0 "Tear down the regimented economy and the swollen bureaucracy that grew up under cover of the emergency. Return the nation to the constitutional order the Founders intended: limited government, balanced budgets, the sovereignty of the several states, and the free enterprise that made America the wonder of the world. The New Deal was a detour; this is the long road home."
 USA_the_american_caesar:0 "The American Caesar"
 USA_the_american_caesar_desc:0 "It is whispered, in certain clubs and certain barracks, that the Republic has grown too creaking and too divided for an age of strongmen, that what America truly needs is a firm executive hand unbound by quarrelsome congresses and meddling courts. It is a dark and profoundly un-American thought, and there are men ready and willing to act upon it. To walk this road is to gamble the Republic itself upon a single throw."

 # --- The Arsenal / Military ---
 USA_the_arsenal:0 "The Arsenal of Democracy"
 USA_the_arsenal_desc:0 "America's truest weapon is not an army but an assembly line; Detroit alone can out-produce empires. Begin the great retooling now, surveying which plants can be turned to war work and which engineers can be set to designing tanks in place of sedans, so that when at last the call comes, the nation can simply drown its enemies beneath an avalanche of materiel."
 USA_war_plan_revision:0 "War Plan Revision"
 USA_war_plan_revision_desc:0 "The old color-coded war plans, drawn up to fight Britain or Mexico or some lone Japanese raid, belong to a vanished world. The General Staff must tear them up and think anew about coalition warfare on a truly global scale, with modern armor, airpower, and logistics, before doctrine written for the trenches of 1918 gets a fresh generation of Americans killed."
 USA_two_ocean_navy:0 "The Two-Ocean Navy"
 USA_two_ocean_navy_desc:0 "A republic that fronts upon both the Atlantic and the Pacific can never be secure with a fleet sized for only one. The Vinson Acts authorize a navy unlike any the world has ever seen: fast carriers, fleet battleships, and the escorts and shipyards to sustain them, a force capable of fighting and winning in two oceans at the very same time."
 USA_total_mobilization:0 "Total Mobilization"
 USA_total_mobilization_desc:0 "The treachery at Pearl Harbor has settled the great argument once and for all. Now there can be no half-measures left. Convert the consumer economy wholesale to the demands of war: ration the home front, conscript the manpower, and unleash the full and terrifying productive capacity of the United States upon the Axis. This is the very hinge of the war."
 USA_strategic_bombing:0 "Strategic Bombing"
 USA_strategic_bombing_desc:0 "From bases in England and across the Pacific, vast formations of heavy bombers will carry the war clear over the heads of the enemy's armies and into the beating heart of his industry. Ball-bearing works, oil refineries, and rail yards will burn, and with them the enemy's very capacity to wage modern war, though the cost in young aircrews will be grievous beyond reckoning."
 USA_amphibious_doctrine:0 "Amphibious Doctrine"
 USA_amphibious_doctrine_desc:0 "To defeat enemies entrenched across the oceans, America must master the single most difficult operation in all of war: hurling an army onto a hostile, defended shore and keeping it supplied there. Landing craft, naval gunfire, and combined-arms assault doctrine will turn every contested beach, from Normandy to the Marianas, into an open door."
 USA_the_manhattan_project:0 "The Manhattan Project"
 USA_the_manhattan_project_desc:0 "In hidden laboratories at Los Alamos, Oak Ridge, and Hanford, under conditions of absolute secrecy, the finest physicists of a generation pursue a weapon that bends the very fabric of matter to military ends. If it should work, a single bomb could erase a city entire, and whoever wields it first may dictate the terms of the peace, and of the whole age that follows."
 USA_dawn_of_the_atomic_age:0 "Dawn of the Atomic Age"
 USA_dawn_of_the_atomic_age_desc:0 "The desert at Trinity has lit up brighter than a thousand suns. The bomb is real, and for this brief moment America alone possesses it. The nation stands atop a new and terrible age as sole master of the atom; the war itself may end in a single flash, but the long shadow this weapon casts will fall across the whole of the century to come."
 USA_scientific_establishment:0 "A Scientific Establishment"
 USA_scientific_establishment_desc:0 "Wars are no longer won by mass alone, but increasingly within the laboratory. Bind the great universities, the national laboratories, and the brightest minds of an entire generation to the service of the state through a permanent national research apparatus, the very seed of an enterprise that will keep America at the cutting edge long after the guns at last fall silent."
 USA_electronics_mastery:0 "Electronics Mastery"
 USA_electronics_mastery_desc:0 "Radar that sees clean through night and fog, the proximity fuze, fire-control computers, the first electronic calculating machines: the humble electron is fast becoming a weapon of war. A decisive American lead in electronics will sharpen every ship, gun, and aircraft in the arsenal, and fling open the door to the transformative technologies of the age to come."
 USA_operations_research:0 "Operations Research"
 USA_operations_research_desc:0 "A new breed of scientist turns rigorous mathematics upon the conduct of war itself: how best to hunt the U-boat, route the convoy, and run a factory at its peak. Institutionalize that discipline across government and industry, and the nation can pursue more lines of advance at once, wringing victory from sheer organizational genius."

 # --- Old World Ties / Diplomacy and the Post-War Order ---
 USA_old_world_ties:0 "Old World Ties"
 USA_old_world_ties_desc:0 "America cannot simply wish the world away. Across two oceans, friends look to Washington for hope while rivals carefully gauge its resolve. The administration must now decide, deliberately and with open eyes, just how deeply the Republic will involve itself in the quarrels of the Old World, and upon whose side its vast weight will eventually come to rest."
 USA_lend_lease_expansion:0 "Lend-Lease Expansion"
 USA_lend_lease_expansion_desc:0 "Why send soldiers when one can send steel? Become the great quartermaster of every nation still fighting tyranny: lend them the destroyers, the tanks, the aircraft, and the food to hold their lines, and let American industry rather than American boys carry the first crushing weight of the war. Neutrality in name, perhaps, but belligerence in plain fact."
 USA_good_neighbor:0 "The Good Neighbor"
 USA_good_neighbor_desc:0 "Gunboat diplomacy has earned America nothing but suspicion south of the Rio Grande. Replace the big stick with the open hand: trade, mutual respect, and genuine partnership in place of armed intervention. A Western Hemisphere united firmly behind the United States is a fortress at the nation's back that no Old World aggressor could ever hope to breach."
 USA_the_grand_alliance:0 "The Grand Alliance"
 USA_the_grand_alliance_desc:0 "No single power can hope to bring down the Axis; it will demand a grand coalition spanning the globe and bridging even bitter ideologies. Forge and lead that alliance, coordinate its strategy and its supply, and hold its quarrelsome partners together through the darkest years, for in unity, and in unity alone, lies the certainty of final victory."
 USA_postwar_planning:0 "Postwar Planning"
 USA_postwar_planning_desc:0 "Even with the issue of the war still very much in doubt, the wise have already begun to plan the peace. The blunders that turned the last armistice into a mere twenty-year truce, the punitive treaties, the financial chaos, the headlong retreat into isolation, must never be repeated. The shape of the postwar world will be drafted now, in Washington's quiet planning rooms."
 USA_bretton_woods:0 "Bretton Woods"
 USA_bretton_woods_desc:0 "At a quiet resort in the New Hampshire hills, the financial architects of the Allied world will build the machinery of an entirely new economic order: stable exchange rates, an International Monetary Fund, a World Bank, and the dollar enthroned at the very center of it all. Anchor global commerce to American currency, and forestall another worldwide collapse."
 USA_the_united_nations:0 "The United Nations"
 USA_the_united_nations_desc:0 "The League of Nations failed because it had no teeth, and because America shamefully stayed home. This time must be different: a true assembly of nations with a Security Council empowered to act, founded at San Francisco with the United States standing at its very heart. A permanent forum to settle the disputes of nations before they can curdle into open war."
 USA_shape_the_peace:0 "Shape the Peace"
 USA_shape_the_peace_desc:0 "Victory confers upon the victor the very heaviest of responsibilities: the drawing of the map that comes after. In the conference halls of Yalta and Potsdam the fate of liberated peoples, defeated enemies, and a hundred contested borders will be decided, and America, now the mightiest power upon the earth, will hold the pen that writes the postwar world."
 USA_marshall_plan:0 "The Marshall Plan"
 USA_marshall_plan_desc:0 "A Europe of cold hearths and empty bellies is the most fertile soil imaginable for extremism. Pour American treasure, billions upon billions of it, into rebuilding the shattered economies of the continent, friend and former foe alike. Prosperous and grateful nations make the surest bulwark against tyranny, and the firmest of allies for the long struggle ahead."
 USA_iron_curtain:0 "The Iron Curtain Descends"
 USA_iron_curtain_desc:0 "From Stettin on the Baltic to Trieste on the Adriatic, as Churchill gravely warns, an iron curtain has descended across the continent. The great wartime partner has become the great postwar rival, swallowing whole nations behind its lengthening shadow. The hot war is won and done; a colder, longer, and perhaps far more dangerous one now begins."
 USA_containment_doctrine:0 "The Containment Doctrine"
 USA_containment_doctrine_desc:0 "The strategy for the long twilight struggle takes its shape: not to roll back the rival empire by force of arms, but to contain it, to meet its every probe and pressure with firm and unyielding counter-pressure at every point upon the globe, patiently and indefinitely, until its own contradictions at last bring it crashing down. Vigilance becomes the permanent price of peace."
 USA_return_to_normalcy:0 "Return to Normalcy"
 USA_return_to_normalcy_desc:0 "The boys are home, the factories hum once more with peacetime goods, and a weary nation longs only to be left alone to enjoy what it has so dearly won. Let America draw back from the world's endless quarrels, tend to its own prosperity, and remember that it was never meant to police the whole of the planet. The world can keep its troubles to itself."
 USA_demobilization:0 "Demobilization"
 USA_demobilization_desc:0 "Twelve million Americans under arms simply cannot be kept in uniform in peacetime; the people will not stand for it and the economy cannot bear it. Bring the boys home, muster them out, and turn the great war machine back toward the abundance of civilian life. Beat the swords into plowshares, and trust that the very worst now lies behind us."
 USA_permanent_establishment:0 "A Permanent Establishment"
 USA_permanent_establishment_desc:0 "The world of 1919 indulged the comforting fantasy that the war to end all wars had truly been fought and won; the world of today knows far better. America must maintain a powerful standing military and the industrial base to feed it, ready upon a moment's notice, for the next great threat is no longer a question of whether, but only of when and where."
 USA_the_american_century:0 "The American Century"
 USA_the_american_century_desc:0 "Industry without rival, ideals that still draw the hopes of the whole world, and the steady inner circle that guided the Republic through depression and total war: all of it together has carried America to a height no nation in history has ever before occupied. This is the American Century, and upon the wisdom and the will of the United States the fate of all mankind now turns."

 # ============================ CABINET MEMBERS ============================

 USA_cabinet_cordell_hull:0 "Cordell Hull"
 USA_cabinet_cordell_hull_desc:0 "Secretary of State. A patient, courtly internationalist who believes that free trade and open dialogue are the surest roads to a lasting peace."
 USA_cabinet_isolationist_state:0 "An Isolationist Secretary"
 USA_cabinet_isolationist_state_desc:0 "Secretary of State. He keeps America aloof from foreign quarrels, hardening the nation against any drift toward another European war."
 USA_cabinet_morgenthau:0 "Henry Morgenthau Jr."
 USA_cabinet_morgenthau_desc:0 "Secretary of the Treasury. A devoted New Dealer and the President's close friend, who finances reform and public works without flinching."
 USA_cabinet_business_treasury:0 "A Man of Business"
 USA_cabinet_business_treasury_desc:0 "Secretary of the Treasury. A friend of industry and sound money who reassures the markets and streamlines the nation's factories."
 USA_cabinet_stimson:0 "Henry Stimson"
 USA_cabinet_stimson_desc:0 "Secretary of War. A resolute Republican interventionist, preparing the army for the storm he is utterly certain is coming."
 USA_cabinet_woodring:0 "Harry Woodring"
 USA_cabinet_woodring_desc:0 "Secretary of War. A heartland isolationist who keeps the military lean, the budget modest, and American boys at home."
 USA_cabinet_murphy:0 "Frank Murphy"
 USA_cabinet_murphy_desc:0 "Attorney General. A crusading defender of civil liberties and the rights of labor who holds the administration to its highest ideals."
 USA_cabinet_security_ag:0 "A Security Hawk"
 USA_cabinet_security_ag_desc:0 "Attorney General. A hard, watchful man who places the security of the Republic above the comforts of dissent."

 # ============================ NATIONAL SPIRITS ============================

 USA_the_second_new_deal_spirit:0 "The Second New Deal"
 USA_the_second_new_deal_spirit_desc:0 "A renewed commitment to reform drives construction forward and restores the people's confidence in the government."
 USA_managed_economy_spirit:0 "A Managed Economy"
 USA_managed_economy_spirit_desc:0 "Coordinated industrial policy keeps the nation's factories running at their full and tireless capacity."
 USA_the_inner_circle_spirit:0 "The Inner Circle"
 USA_the_inner_circle_spirit_desc:0 "A complete and trusted cabinet amplifies the President's authority and steadies the entire ship of state."
 USA_progressive_coalition_spirit:0 "Progressive Coalition"
 USA_progressive_coalition_spirit_desc:0 "The reformers hold the reins of power, and the hard-won promise of the New Deal is secure for a generation."
 USA_conservative_coalition_spirit:0 "Conservative Coalition"
 USA_conservative_coalition_spirit_desc:0 "The Old Guard restores order and the quiet confidence of enterprise to the affairs of the nation."
 USA_economic_bill_of_rights_spirit:0 "Economic Bill of Rights"
 USA_economic_bill_of_rights_spirit_desc:0 "Economic security is now the acknowledged birthright of every citizen, binding the nation together in common purpose."
 USA_cooperative_commonwealth_spirit:0 "Cooperative Commonwealth"
 USA_cooperative_commonwealth_spirit_desc:0 "The great industries are turned to the service of the many, and the whole social order is remade upon new foundations."
 USA_old_republic_spirit:0 "The Old Republic Restored"
 USA_old_republic_spirit_desc:0 "Limited government and free enterprise return to their rightful place at the very heart of American life."
 USA_american_caesar_spirit:0 "The American Caesar"
 USA_american_caesar_spirit_desc:0 "A strong executive hand imposes order upon a fractured nation, at the heavy cost of the old constitutional restraints."
 USA_scientific_establishment_spirit:0 "A Scientific Establishment"
 USA_scientific_establishment_spirit_desc:0 "A coordinated national research effort speeds American science relentlessly forward."
 USA_operations_research_spirit:0 "Operations Research"
 USA_operations_research_spirit_desc:0 "Scientific method applied to war and industry alike sharpens both research and production."
 USA_total_mobilization_spirit:0 "Total Mobilization"
 USA_total_mobilization_spirit_desc:0 "The full might of American industry and manpower is committed without reservation to the war effort."
 USA_atomic_monopoly_spirit:0 "Atomic Monopoly"
 USA_atomic_monopoly_spirit_desc:0 "America alone commands the secrets of the atom, and a wary world treads very carefully indeed."
 USA_lend_lease_spirit:0 "Arsenal of the Democracies"
 USA_lend_lease_spirit_desc:0 "American war material flows freely to friends across the seas at little political cost at home."
 USA_postwar_planning_spirit:0 "Postwar Planning"
 USA_postwar_planning_spirit_desc:0 "Careful preparation for the peace strengthens the President's hand both at home and abroad."
 USA_bretton_woods_spirit:0 "Bretton Woods System"
 USA_bretton_woods_spirit_desc:0 "The dollar anchors a stable world economy, built deliberately to American advantage."
 USA_united_nations_spirit:0 "The United Nations"
 USA_united_nations_spirit_desc:0 "A standing forum for the nations of the world lends American diplomacy an unmatched reach."
 USA_marshall_plan_spirit:0 "The Marshall Plan"
 USA_marshall_plan_spirit_desc:0 "Generous American aid rebuilds a shattered world and wins the nation lasting friends."
 USA_iron_curtain_spirit:0 "Cold War Vigilance"
 USA_iron_curtain_spirit_desc:0 "A wary nation steels itself for the long struggle against the new rival across the divide."
 USA_containment_spirit:0 "Containment"
 USA_containment_spirit_desc:0 "America stands ever ready to hold the line wherever the rival power presses outward."
 USA_return_to_normalcy_spirit:0 "Return to Normalcy"
 USA_return_to_normalcy_spirit_desc:0 "A contented nation turns gratefully to peace and prosperity at home."
 USA_demobilization_spirit:0 "Demobilization"
 USA_demobilization_spirit_desc:0 "The armies come home and the economy turns to the long-awaited abundance of peace."
 USA_permanent_establishment_spirit:0 "Permanent Military Establishment"
 USA_permanent_establishment_spirit_desc:0 "A standing military and its supporting industry keep America ready for any threat that may come."
 USA_american_century_spirit:0 "The American Century"
 USA_american_century_spirit_desc:0 "Industry, ideals, and steady leadership together place America at the very summit of the world."

 # ============================ EVENTS ============================

 USA_cabinet.1.t:0 "The Inner Circle Assembles"
 USA_cabinet.1.d:0 "Around the long table in the Cabinet Room, the men who will steer the Republic through the coming storm have at last taken their seats. Each carries his own ambitions and his own vision of America's future. The President listens, weighs, and decides; but it is these advisors who will turn each decision into action."
 USA_cabinet.1.a:0 "The work of governing begins."
 USA_cabinet.2.t:0 "Planning the Peace"
 USA_cabinet.2.d:0 "The war is not yet won, but already the cabinet turns its mind toward what must follow. The chaos that doomed the last peace cannot be permitted to repeat itself. Economists, diplomats, and soldiers alike sketch the architecture of a new world order, with America standing firmly at its center."
 USA_cabinet.2.a:0 "We will not repeat the mistakes of Versailles."
 USA_cabinet.3.t:0 "The American Century"
 USA_cabinet.3.d:0 "From the depths of the Depression to the very summit of the world, the Republic has been remade by the choices of these years and the men who counseled them. Whatever road was finally taken, America now stands as the decisive power of the age, and the century to come will surely bear her mark."
 USA_cabinet.3.a:0 "Let us be worthy of it."

 # ============================ WAR ENTRY & NEUTRALITY ============================

 USA_the_question_of_neutrality:0 "The Question of Neutrality"
 USA_the_question_of_neutrality_desc:0 "Since the disillusionment that followed the last war, a wall of Neutrality Acts has walled America off from the world's quarrels. As the dictators grow bolder, the Republic must decide whether that wall is a shield or a cage, and begin, carefully, to debate its own future."
 USA_revise_the_neutrality_acts:0 "Revise the Neutrality Acts"
 USA_revise_the_neutrality_acts_desc:0 "Begin to chip away at the rigid neutrality laws that bind the President's hands. Each amendment is a hard-fought battle in Congress, but each one widens America's room to act and stirs the public from its long isolationist slumber."
 USA_cash_and_carry:0 "Cash and Carry"
 USA_cash_and_carry_desc:0 "Let the warring democracies buy American arms, so long as they pay in cash and carry the goods in their own ships. It keeps America technically neutral and out of the U-boats' path, while quietly throwing the weight of American industry behind the enemies of fascism."
 USA_fortress_america:0 "Fortress America"
 USA_fortress_america_desc:0 "Let the Old World burn if it must. America will pull up the drawbridge, fortify its shores and its hemisphere, and trust that no enemy can ever reach across the oceans to threaten the Republic. The quarrels of Europe and Asia are not ours to settle."
 USA_repeal_the_arms_embargo:0 "Repeal the Arms Embargo"
 USA_repeal_the_arms_embargo_desc:0 "Strike down the last great barrier to arming the democracies. With the embargo lifted, the full output of American factories can flow to those who stand against tyranny, and the nation takes another long stride from neutrality toward open partnership."
 USA_selective_service_act:0 "The Selective Service Act"
 USA_selective_service_act_desc:0 "Institute the first peacetime draft in the nation's history. It is a bitter pill for a country that loves its civilian ways, but a trained mass of citizen-soldiers is the only foundation upon which a great wartime army can ever be built."
 USA_america_goes_to_war:0 "America Goes to War"
 USA_america_goes_to_war_desc:0 "The long debate is over. Whether by deliberate choice or by an enemy's reckless blow, the United States now throws aside the last shreds of neutrality and commits itself, body and soul, to the great struggle. The sleeping giant is awake, and filled with a terrible resolve."
 USA_hemisphere_defense:0 "Hemisphere Defense"
 USA_hemisphere_defense_desc:0 "If America will not go to the war, it must ensure the war cannot come to America. Ring the hemisphere with bases, patrols, and garrisons, and make the New World an impregnable bastion against any aggressor foolish enough to look westward."
 USA_continental_fortress:0 "Continental Fortress"
 USA_continental_fortress_desc:0 "Complete the transformation of the Americas into a self-sufficient armed citadel. Behind two oceans and an unbreakable wall of steel, the Republic can wait out the storms of the Old World in security, beholden to no one and threatened by none."

 # ============================ THE ARMY ============================

 USA_the_war_department_army:0 "The War Department"
 USA_the_war_department_army_desc:0 "The United States Army is a hollow shell, ranked below that of Portugal, scattered in understrength garrisons and armed with the leftovers of the last war. The War Department must begin the long, unglamorous work of forging it into a modern fighting force before the storm breaks."
 USA_modernize_the_national_guard:0 "Modernize the National Guard"
 USA_modernize_the_national_guard_desc:0 "The citizen-soldiers of the National Guard are the reserve upon which any wartime army must be built. Federalize them, re-equip them, and drill them to regular standards, turning a patchwork of state militias into the backbone of a continental army."
 USA_armored_force:0 "The Armored Force"
 USA_armored_force_desc:0 "Watching the panzers slice through Poland and France has settled the argument. America will build an Armored Force of its own: massed tanks, mechanized infantry, and the doctrine to wield them as a battering ram rather than scattered among the infantry."
 USA_field_artillery:0 "Field Artillery"
 USA_field_artillery_desc:0 "American gunnery will be second to none. With superb pieces, lavish ammunition, and the radio-coordinated fire-direction techniques that let a single observer call down the wrath of an entire battalion, the artillery will become the Army's deadliest arm."
 USA_combined_arms_doctrine:0 "Combined Arms Doctrine"
 USA_combined_arms_doctrine_desc:0 "Tanks, infantry, artillery, and aircraft must fight not as separate arms but as a single coordinated fist. Train the Army in the integrated combined-arms doctrine that turns men and machines into something far greater than the sum of its parts."
 USA_airborne_forces:0 "Airborne Forces"
 USA_airborne_forces_desc:0 "Raise divisions that descend from the sky behind enemy lines, seizing bridges, crossroads, and gun batteries before the foe even knows the battle has begun. The paratrooper and the glider-borne soldier will become the spearhead of the American assault."
 USA_the_modern_us_army:0 "The Modern U.S. Army"
 USA_the_modern_us_army_desc:0 "From a forgotten garrison force into the most lavishly equipped and mobile army on earth: the transformation is complete. Fully motorized, generously supplied, and backed by overwhelming firepower, the modern U.S. Army is ready to fight and win on any continent."

 # ============================ THE AIR FORCE ============================

 USA_the_army_air_corps:0 "The Army Air Corps"
 USA_the_army_air_corps_desc:0 "Airpower visionaries have long argued that the next war will be won in the skies. Expand the Army Air Corps, build the training pipelines and the airfields, and lay the groundwork for an air arm of a size and reach the world has never before imagined."
 USA_pursuit_aviation:0 "Pursuit Aviation"
 USA_pursuit_aviation_desc:0 "Command of the air begins with the fighter. Develop fast, rugged, long-legged pursuit planes and the pilots to fly them, for no bomber stream can reach its target and no army can maneuver freely beneath a sky the enemy still owns."
 USA_strategic_bombing_command:0 "Strategic Bombing Command"
 USA_strategic_bombing_command_desc:0 "Build the great fleets of four-engine heavy bombers, the Flying Fortresses and Liberators, that will carry the war over the heads of the enemy's armies and into the very heart of his war economy. Daylight precision bombing will become an American signature."
 USA_naval_aviation:0 "Naval Aviation"
 USA_naval_aviation_desc:0 "The aircraft carrier is fast eclipsing the battleship as the true arbiter of sea power. Forge the dive-bombers, torpedo planes, and carrier fighters, and the doctrine to mass them, that will let American airpower reach across the widest oceans on earth."
 USA_air_superiority_doctrine:0 "Air Superiority Doctrine"
 USA_air_superiority_doctrine_desc:0 "Master the art of sweeping the enemy from the skies and keeping him there. With air superiority assured, the bombers strike unmolested, the armies advance unobserved, and the full weight of American airpower can be brought to bear at will."
 USA_the_mighty_eighth:0 "The Mighty Eighth"
 USA_the_mighty_eighth_desc:0 "Thousand-plane raids darkening the skies over the enemy's cities; escort fighters ranging deep into his heartland; an air force grown beyond anything in human history. The mightiest aerial armada ever assembled is ready to wage total war from the air."

 # ============================ THE NAVY & WAR PLANS ============================

 USA_naval_construction:0 "Naval Construction"
 USA_naval_construction_desc:0 "The United States Navy must be ready to fight in two oceans at once. Lay down the keels, expand the great yards from Norfolk to Puget Sound, and train the crews for the largest naval expansion any nation has ever attempted."
 USA_war_plan_orange:0 "War Plan Orange"
 USA_war_plan_orange_desc:0 "For decades the planners at the Naval War College have war-gamed a Pacific campaign against Japan: the long advance across the island chains, the great fleet battle, the strangling blockade. Dust off and modernize War Plan Orange for the conflict now looming in the east."
 USA_war_plan_black:0 "War Plan Black"
 USA_war_plan_black_desc:0 "Should the war in Europe reach across the Atlantic, America must be ready. War Plan Black prepares the forces and logistics to fight a German enemy, whether to defend the hemisphere or to carry the fight to the Old World itself."
 USA_war_plan_red:0 "War Plan Red"
 USA_war_plan_red_desc:0 "An old and now improbable contingency: war against the British Empire and its great fleet. However unlikely such a clash has become, the studies sharpen American naval thinking against the strongest navy on earth and keep every option upon the table."
 USA_pacific_fleet:0 "The Pacific Fleet"
 USA_pacific_fleet_desc:0 "Concentrate American naval might in the vast reaches of the Pacific, built around the fast carriers and the long logistical tail needed to project power across thousands of miles of open water toward the empire of the rising sun."
 USA_atlantic_fleet:0 "The Atlantic Fleet"
 USA_atlantic_fleet_desc:0 "Guard the convoy lifelines to Britain and stand ready to face the surface raiders and U-boats of the Atlantic. The Atlantic Fleet, with its battleships and escorts, will keep the sea lanes open and the Old World supplied."
 USA_silent_service:0 "The Silent Service"
 USA_silent_service_desc:0 "Beneath the waves, the submarine force will wage a quiet and merciless war against the enemy's merchant marine. A handful of boats can strangle an island empire's economy, sinking the tankers and freighters upon which its whole war effort depends."
 USA_carrier_task_force:0 "The Carrier Task Force"
 USA_carrier_task_force_desc:0 "The fast carrier task force, a self-contained fortress of airpower roaming the open sea, becomes the spearhead of American naval doctrine. Around its flight decks the entire fleet is reorganized, and with it America will rule both oceans."

 # ============================ POLITICS & THE HOME FRONT ============================

 USA_the_political_landscape:0 "The Political Landscape"
 USA_the_political_landscape_desc:0 "America is a restless democracy of competing interests, regions, and passions, and no president governs it for long without tending the machine. Take the measure of Congress, the press, and the people, and prepare to lead a fractious nation through the trials ahead."
 USA_fireside_chats:0 "Fireside Chats"
 USA_fireside_chats_desc:0 "By radio, into the living rooms of millions, the President speaks plainly and warmly of the nation's troubles and its hopes. These intimate broadcasts forge a bond between the people and their leader unlike anything in American political life, and steady the country in dark hours."
 USA_war_bonds:0 "War Bonds"
 USA_war_bonds_desc:0 "Ask every American to lend the nation a share of victory. Through bond drives, war stamps, and the tireless work of stars and volunteers, the home front will finance the war effort while binding the whole people emotionally to the cause."
 USA_appoint_perkins:0 "Appoint Frances Perkins"
 USA_appoint_perkins_desc:0 "Frances Perkins, the first woman ever to sit in the Cabinet, has been the tireless architect of the New Deal's labor reforms, from Social Security to the minimum wage. As Secretary of Labor she keeps the home front productive and at peace, and gives the progressives another champion."
 USA_civil_rights:0 "The Cause of Civil Rights"
 USA_civil_rights_desc:0 "The promise of American democracy rings hollow while millions of citizens are denied its blessings by reason of their color. Begin, against fierce resistance, to extend that promise: desegregate the war industries, and call the whole of the nation's talent into common service."
 USA_maintain_segregation:0 "Maintain the Status Quo"
 USA_maintain_segregation_desc:0 "The old order of the states must not be disturbed, least of all in time of war. Defer to the powerful Southern bloc whose votes the administration cannot do without, and leave the question of race for a quieter and more distant day."
 USA_appoint_knox:0 "Appoint Frank Knox"
 USA_appoint_knox_desc:0 "Frank Knox, Republican newspaperman and Rough Rider, takes the Navy Department in a gesture of national unity across party lines. A staunch interventionist, he will drive the great naval expansion forward and lend the war effort a bipartisan face."
 USA_a_more_perfect_union:0 "A More Perfect Union"
 USA_a_more_perfect_union_desc:0 "Through trial and division, the Republic has held together and grown stronger. Whatever course was chosen on the home front, the nation now stands united in purpose, its people bound to one another and to the great task that history has set before them."

 # ============================ NEW NATIONAL SPIRITS ============================

 USA_interventionism_spirit:0 "Rising Interventionism"
 USA_interventionism_spirit_desc:0 "The tide of isolationist sentiment is turning as Americans awaken to the dangers abroad."
 USA_fortress_america_spirit:0 "Fortress America"
 USA_fortress_america_spirit_desc:0 "A nation turned inward, secure behind its oceans and resolved to let the Old World fight its own wars."
 USA_selective_service_spirit:0 "Selective Service"
 USA_selective_service_spirit_desc:0 "The first peacetime draft in the nation's history fills the ranks of a growing army."
 USA_continental_fortress_spirit:0 "Continental Fortress"
 USA_continental_fortress_spirit_desc:0 "The Americas stand as a self-sufficient armed citadel, impregnable behind two oceans."
 USA_national_guard_spirit:0 "Modernized National Guard"
 USA_national_guard_spirit_desc:0 "The federalized National Guard forms a well-drilled backbone for the wartime army."
 USA_combined_arms_spirit:0 "Combined Arms Doctrine"
 USA_combined_arms_spirit_desc:0 "Tanks, infantry, guns, and aircraft fight as a single coordinated fist."
 USA_modern_army_spirit:0 "The Modern U.S. Army"
 USA_modern_army_spirit_desc:0 "The most mobile and lavishly equipped army on earth, ready to fight on any continent."
 USA_army_air_corps_spirit:0 "The Army Air Corps"
 USA_army_air_corps_spirit_desc:0 "A rapidly expanding air arm, with the training and airfields to grow without limit."
 USA_air_doctrine_spirit:0 "Masters of the Air"
 USA_air_doctrine_spirit_desc:0 "The mightiest aerial armada in history wages total war from the skies."
 USA_war_plan_orange_spirit:0 "War Plan Orange"
 USA_war_plan_orange_spirit_desc:0 "Decades of Pacific war-gaming give the fleet a decisive edge across the great ocean."
 USA_war_plan_black_spirit:0 "War Plan Black"
 USA_war_plan_black_spirit_desc:0 "Careful planning prepares the army to face a European foe."
 USA_war_plan_red_spirit:0 "War Plan Red"
 USA_war_plan_red_spirit_desc:0 "Studies against the world's strongest navy keep American sea power razor sharp."
 USA_pacific_fleet_spirit:0 "The Pacific Fleet"
 USA_pacific_fleet_spirit_desc:0 "American naval might concentrated for power projection across the vast Pacific."
 USA_atlantic_fleet_spirit:0 "The Atlantic Fleet"
 USA_atlantic_fleet_spirit_desc:0 "Guardians of the convoy lifelines and the sea lanes to a beleaguered Britain."
 USA_silent_service_spirit:0 "The Silent Service"
 USA_silent_service_spirit_desc:0 "A merciless submarine campaign strangles the enemy's merchant marine beneath the waves."
 USA_carrier_doctrine_spirit:0 "Carrier Doctrine"
 USA_carrier_doctrine_spirit_desc:0 "The fast carrier task force becomes the roaming spearhead of American sea power."
 USA_fireside_chats_spirit:0 "Fireside Chats"
 USA_fireside_chats_spirit_desc:0 "The President's intimate radio addresses forge an unshakeable bond with the people."
 USA_war_bonds_spirit:0 "War Bonds"
 USA_war_bonds_spirit_desc:0 "A nation of small investors finances the war effort and binds itself to the cause."
 USA_civil_rights_spirit:0 "The Cause of Civil Rights"
 USA_civil_rights_spirit_desc:0 "Extending democracy's promise calls the whole of the nation's talent into common service."
 USA_segregation_spirit:0 "The Status Quo"
 USA_segregation_spirit_desc:0 "Deference to the old order keeps the powerful Southern bloc firmly within the fold."
 USA_more_perfect_union_spirit:0 "A More Perfect Union"
 USA_more_perfect_union_spirit_desc:0 "A nation united in purpose, its people bound to one another and to the great task ahead."
 USA_cabinet_perkins:0 "Frances Perkins"
 USA_cabinet_perkins_desc:0 "Secretary of Labor. The first woman in the Cabinet and tireless architect of the New Deal's labor reforms."
 USA_cabinet_knox:0 "Frank Knox"
 USA_cabinet_knox_desc:0 "Secretary of the Navy. A Republican interventionist who drives the great naval expansion in a spirit of national unity."

 # ============================ CABINET SEAT ADDITIONS ============================

 USA_department_of_labor:0 "The Department of Labor"
 USA_department_of_labor_desc:0 "In the age of the sit-down strike and the picket line, the Department of Labor stands between the nation and industrial war. Its secretary must command the trust of the unions without losing that of the boardrooms, and keep the great machine of American production turning through every dispute."
 USA_department_of_the_navy:0 "The Department of the Navy"
 USA_department_of_the_navy_desc:0 "The Navy Department commands the fleets and the great yards that build them. With two oceans to master and a two-ocean navy on the drawing boards, its secretary will preside over the largest naval expansion in the history of the world."
 USA_the_presidents_men:0 "The President's Men"
 USA_the_presidents_men_desc:0 "Progressive or Old Guard, reformer or restorer, the circle around the President has settled into its final shape and learned to move as one. Whatever their quarrels behind closed doors, the administration now speaks with a single voice, and the machinery of American government answers to it."

 # ============================ THE PEOPLE'S REPUBLIC ============================

 USA_the_peoples_republic:0 "The People's Republic"
 USA_the_peoples_republic_desc:0 "The civil war is won and the old order lies broken. From the ruins of the constitutional republic the victors proclaim a new state, a people's republic dedicated to the workers who built America and bled for it. The world watches in astonishment as the citadel of capitalism raises the red banner."
 USA_collectivize_the_great_plains:0 "Collectivize the Great Plains"
 USA_collectivize_the_great_plains_desc:0 "The great farms of the heartland, so recently ruined by dust and debt, are gathered into collectives and cooperatives on a continental scale. If it succeeds, no worker in America need ever fear hunger again; the granaries of the revolution will feed the cities and the armies alike."
 USA_workers_councils_in_industry:0 "Workers' Councils in Industry"
 USA_workers_councils_in_industry_desc:0 "In Detroit, Pittsburgh, and Gary the factory committees take their seats in the front offices. The men who work the lines now direct them, and production becomes a matter of pride rather than compulsion. The great industries are turned, plant by plant, to the service of the many."
 USA_the_peoples_militia:0 "The People's Militia"
 USA_the_peoples_militia_desc:0 "The workers' militias that won the civil war will not be disbanded; they will be forged into the shield of the revolution. Drilled, disciplined, and devoted, the people under arms are the surest guarantee that the old order will never return."
 USA_a_new_social_contract:0 "A New Social Contract"
 USA_a_new_social_contract_desc:0 "Work for every hand, bread on every table, a roof over every family: the revolution writes its promises into law. Where the old republic offered liberty and let the strong define it, the new one offers security to all, and asks in return only loyalty to the common cause."
 USA_look_to_moscow:0 "Look to Moscow"
 USA_look_to_moscow_desc:0 "The Soviet Union is the elder sibling of the revolution, and its experience, its engineers, and its patience are freely offered. Bind the American revolution to the international movement and its acknowledged center, whatever misgivings some comrades may harbor about Comrade Stalin's methods."
 USA_an_american_road_to_socialism:0 "An American Road to Socialism"
 USA_an_american_road_to_socialism_desc:0 "The revolution was made by Americans, in American conditions, and it will find its own way forward. There will be no foreign commissars in Washington. Socialism here will grow from the town meeting, the union hall, and the cooperative, and answer to no capital but its own."
 USA_join_the_comintern:0 "Join the Comintern"
 USA_join_the_comintern_desc:0 "The American section takes its seat in the Communist International, and the world revolution gains its mightiest member. From this day the industrial power of the New World stands openly behind the socialist cause on every continent."
 USA_the_red_atlantic:0 "The Red Atlantic"
 USA_the_red_atlantic_desc:0 "The fleets of the old republic fly new colors now. Rebuilt and rearmed, the people's navy will make the Atlantic a highway for the revolution and a wall against its enemies, guarding the sea lanes that bind the socialist world together."
 USA_the_continental_international:0 "The Continental International"
 USA_the_continental_international_desc:0 "If the old Internationals answer to Moscow, then the Americas shall have their own. Found a league of the hemisphere's workers and republics with the American revolution at its head, a new pole of the socialist world beholden to no one."
 USA_revolution_without_borders:0 "Revolution Without Borders"
 USA_revolution_without_borders_desc:0 "The revolution is not an American possession but a human one. Money, organizers, and arms flow south and north to every union hall and campesino league in the hemisphere. The old ruling classes of the Americas feel the ground begin to shift beneath their feet."
 USA_the_workers_century:0 "The Workers' Century"
 USA_the_workers_century_desc:0 "From the depths of the Depression to the world's first industrial workers' state: whatever the cost, the transformation is complete. The century to come will be argued over in every capital on earth, but it will be built in the factories of a socialist America."

 # ============================ THE SILVER REPUBLIC ============================

 USA_the_silver_republic:0 "The Silver Republic"
 USA_the_silver_republic_desc:0 "Out of the civil war's ashes the victors proclaim their new order: a Silver Republic, wrapped in the flag and the cross, ruled by the Legion that won the war. The old constitution is suspended 'for the duration of the emergency' — an emergency that its new masters intend shall never end."
 USA_the_leader_principle:0 "The Leader Principle"
 USA_the_leader_principle_desc:0 "One nation, one movement, one Leader. The presidency swells into something the Founders would not recognize, its word becoming law and its portrait hanging in every schoolroom. Dissent is not debated now; it is managed, and the machinery for managing it grows by the day."
 USA_the_corporate_state:0 "The Corporate State"
 USA_the_corporate_state_desc:0 "Capital and labor are bound together into great state syndicates, their quarrels dissolved by decree. The strike and the lockout are alike abolished, and the industrialists discover that partnership with the new order is both very profitable and very much compulsory."
 USA_a_uniformed_nation:0 "A Uniformed Nation"
 USA_a_uniformed_nation_desc:0 "From the schoolyard to the shop floor, the Republic dresses its people in uniform. Youth legions drill on the ballfields, veterans' columns march on every holiday, and the line between citizen and soldier grows thinner with each passing season."
 USA_the_new_order_at_home:0 "The New Order at Home"
 USA_the_new_order_at_home_desc:0 "The consolidation is complete. The courts are tamed, the press speaks with one voice, and the machinery of the old democracy has been hollowed into pageantry. Whatever else may be said of the new order, the trains run, the factories hum, and the streets are very, very quiet."
 USA_an_understanding_with_berlin:0 "An Understanding with Berlin"
 USA_an_understanding_with_berlin_desc:0 "The two great powers of the new politics have much to offer one another: German science, American industry, and a shared contempt for the dying liberal order. Let there be an understanding across the Atlantic, and let the old empires tremble at what it may become."
 USA_america_stands_alone:0 "America Stands Alone"
 USA_america_stands_alone_desc:0 "The new America bends the knee to no one, least of all to a Bavarian corporal and his Reich. The American new order is its own creed and its own master, and if Berlin imagines the Silver Republic as a junior partner, Berlin will learn otherwise."
 USA_divide_the_old_world:0 "Divide the Old World"
 USA_divide_the_old_world_desc:0 "Quiet men in quiet rooms sketch the future upon the map: spheres, mandates, and zones of interest, the Old World parceled between the new powers. Whether the bargain holds is another question, but for now it serves both signatories to pretend that it will."
 USA_the_atlantic_axis:0 "The Atlantic Axis"
 USA_the_atlantic_axis_desc:0 "The understanding hardens into alliance. From Berlin to Washington runs the axis of a new age, and the democracies that remain find themselves caught between the hammer and the anvil of history."
 USA_the_silver_pact:0 "The Silver Pact"
 USA_the_silver_pact_desc:0 "America forges its own league of the like-minded: a Silver Pact of the New World, under American leadership and beholden to no European master. The hemisphere will have its new order — an American one."
 USA_a_rival_new_order:0 "A Rival New Order"
 USA_a_rival_new_order_desc:0 "There cannot be two suns in the sky. Germany's Reich and the Silver Republic each claim to be the future, and the future is indivisible. The confrontation that all Europe fears is coming; America means to win it, and to stand alone at the summit of the age that follows."
 USA_the_silver_century:0 "The Silver Century"
 USA_the_silver_century_desc:0 "The Republic that emerged from the civil war now bestrides the world, feared where it is not loved, obeyed where it is not feared. Its makers call this the Silver Century. History will have its own name for it."

 # ============================ THE BUSINESS OF AMERICA ============================

 USA_the_business_of_america:0 "The Business of America"
 USA_the_business_of_america_desc:0 "'The chief business of the American people,' Coolidge said, 'is business.' With the reformers checked and sound men in the counting houses, the Republic returns to that creed: low taxes, hard money, and a government that knows when to leave well enough alone."
 USA_wall_street_resurgent:0 "Wall Street Resurgent"
 USA_wall_street_resurgent_desc:0 "The ticker tape runs hot again. Capital that hid through the long emergency comes roaring back into the exchanges, and the financiers of New York once more bankroll the industry of a continent — chastened, perhaps, but hardly humbled."
 USA_the_republican_restoration:0 "The Republican Restoration"
 USA_the_republican_restoration_desc:0 "The party of Lincoln, McKinley, and Coolidge returns to its accustomed place at the head of the nation's affairs. The experiments of the past decade are filed away as a fever survived, and the old establishment settles back into power with a sigh of profound relief."
 USA_an_engine_of_prosperity:0 "An Engine of Prosperity"
 USA_an_engine_of_prosperity_desc:0 "Unshackled and unafraid, the American economy becomes what its champions always promised: the greatest engine of prosperity the world has ever seen, its abundance the envy of every rival creed and the quiet argument that wins where armies cannot."

 # ============================ NEW SPIRITS: RED, SILVER & GOLD ============================

 USA_peoples_republic_spirit:0 "The People's Republic"
 USA_peoples_republic_spirit_desc:0 "A new state built on the promise that the workers who made America shall govern it."
 USA_collectivized_agriculture_spirit:0 "Collectivized Agriculture"
 USA_collectivized_agriculture_spirit_desc:0 "The granaries of the revolution feed the cities and the armies alike."
 USA_workers_councils_spirit:0 "Workers' Councils"
 USA_workers_councils_spirit_desc:0 "The men who work the lines now direct them, and production has become a matter of pride."
 USA_red_guards_spirit:0 "The People's Militia"
 USA_red_guards_spirit_desc:0 "The people under arms are the surest guarantee against the old order's return."
 USA_american_socialism_spirit:0 "An American Road to Socialism"
 USA_american_socialism_spirit_desc:0 "A revolution grown from the town meeting and the union hall, answering to no foreign capital."
 USA_world_revolution_spirit:0 "Revolution Without Borders"
 USA_world_revolution_spirit_desc:0 "Money, organizers, and arms flow to every corner of the hemisphere in the revolution's cause."
 USA_workers_century_spirit:0 "The Workers' Century"
 USA_workers_century_spirit_desc:0 "The century to come will be built in the factories of a socialist America."
 USA_silver_republic_spirit:0 "The Silver Republic"
 USA_silver_republic_spirit_desc:0 "A new order wrapped in the flag, ruled by the Legion that won the civil war."
 USA_leader_principle_spirit:0 "The Leader Principle"
 USA_leader_principle_spirit_desc:0 "One nation, one movement, one Leader, whose word has quietly become law."
 USA_corporate_state_spirit:0 "The Corporate State"
 USA_corporate_state_spirit_desc:0 "Capital and labor bound into state syndicates, their quarrels dissolved by decree."
 USA_uniformed_nation_spirit:0 "A Uniformed Nation"
 USA_uniformed_nation_spirit_desc:0 "From schoolyard to shop floor, the line between citizen and soldier grows ever thinner."
 USA_hemisphere_iron_spirit:0 "A Hemisphere of Iron"
 USA_hemisphere_iron_spirit_desc:0 "The New World belongs to its own new order, and to no European master."
 USA_atlantic_axis_spirit:0 "The Atlantic Axis"
 USA_atlantic_axis_spirit_desc:0 "From Berlin to Washington runs the axis of a new and fearsome age."
 USA_silver_century_spirit:0 "The Silver Century"
 USA_silver_century_spirit_desc:0 "Feared where it is not loved, obeyed where it is not feared."
 USA_business_republic_spirit:0 "The Business of America"
 USA_business_republic_spirit_desc:0 "Low taxes, hard money, and a government that knows when to leave well enough alone."


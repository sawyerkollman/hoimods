 USA_alf_landon_desc:0 "The amiable governor of Kansas, swept into the White House on a promise of sound money, balanced budgets, and a government that minds its own business."
 USA_wendell_willkie_desc:0 "The barefoot boy from Wall Street: a utilities lawyer and lifelong Democrat turned Republican nominee, an internationalist in a party of isolationists, carried to the White House on raw charm and a promise to run the New Deal better than its inventors."
 USA_thomas_dewey_desc:0 "The racket-busting prosecutor of New York, precise, tireless, and young, who promises a competent and modern administration that keeps the gains of the age while cutting away its excesses."
 USA_harry_truman_desc:0 "The haberdasher from Independence, plain-spoken and stubborn, who never asked for the job and declines, absolutely, to lose it politely."
 USA_henry_wallace_desc:0 "The dreamer-agronomist of the Progressive crusade, prophet of the century of the common man, carried into office by a country that decided the old parties had nothing left to say."
 USA_dwight_eisenhower_desc:0 "The Supreme Commander himself, drafted by a nation that trusts the man far more than either party: smiling, moderate, and immovable."
 USA_adlai_stevenson_desc:0 "The Governor of Illinois, witty and literate to a fault, who asked the voters to think and was rewarded, against all professional advice, with their votes."

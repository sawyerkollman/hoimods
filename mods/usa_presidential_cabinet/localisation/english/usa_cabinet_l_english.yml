 # ============================ PARTIES & LEADERS ============================

 USA_gop_party:0 "Republican Party"
 USA_gop_party_long:0 "Republican Party"
 USA_dem_party:0 "Democratic Party"
 USA_dem_party_long:0 "Democratic Party"
 USA_prog_party:0 "Progressive Party"
 USA_prog_party_long:0 "Progressive Party"
 USA_alf_landon_desc:0 "The amiable governor of Kansas, swept into the White House on a promise of sound money, balanced budgets, and a government that minds its own business."
 USA_wendell_willkie_desc:0 "The barefoot boy from Wall Street: a utilities lawyer and lifelong Democrat turned Republican nominee, an internationalist in a party of isolationists, carried to the White House on raw charm and a promise to run the New Deal better than its inventors."
 USA_thomas_dewey_desc:0 "The racket-busting prosecutor of New York, precise, tireless, and young, who promises a competent and modern administration that keeps the gains of the age while cutting away its excesses."
 USA_harry_truman_desc:0 "The haberdasher from Independence, plain-spoken and stubborn, who never asked for the job and declines, absolutely, to lose it politely."
 USA_henry_wallace_desc:0 "The dreamer-agronomist of the Progressive crusade, prophet of the century of the common man, carried into office by a country that decided the old parties had nothing left to say."
 USA_dwight_eisenhower_desc:0 "The Supreme Commander himself, drafted by a nation that trusts the man far more than either party: smiling, moderate, and immovable."
 USA_dwight_eisenhower_gop_desc:0 "The Supreme Allied Commander of Europe, persuaded at last that the Republican Party and not the Democratic Party will allow him to govern as he believes: fiscally prudent, internationally engaged, and never for a moment unaware of the weight of the office."
 USA_adlai_stevenson_desc:0 "The Governor of Illinois, witty and literate to a fault, who asked the voters to think and was rewarded, against all professional advice, with their votes."
 USA_robert_taft_desc:0 "Mr. Republican, the Senate's conscience: a man of iron principle, suspicious of entangling alliances, contemptuous of executive overreach, and utterly certain that the Republic's greatest enemy is not the Kremlin but an unlimited government in Washington."

 # ============================ REPUBLICAN WING (TASK 7) ============================

 # --- GOP wing, 1936-44 ---
 USA_gop_landon_banner:0 "The Sunflower Standard"
 USA_gop_landon_banner_desc:0 "Governor Alf Landon of Kansas carries the Republican standard: sound money, balanced accounts, and a government that knows its proper limits. The party is reduced and outnumbered, but it is not yet finished, and it means to prove the New Deal a costly detour rather than a permanent destination."
 USA_gop_nine_old_men_win:0 "The Nine Old Men Hold"
 USA_gop_nine_old_men_win_desc:0 "The President's court-packing scheme has been held at bay by the Republican opposition and the Senate's own jealousy of its prerogatives. Nine justices remain nine, the Constitution is not enlarged by executive convenience, and the party of Lincoln claims the victory of principle over politics."
 USA_gop_balanced_budget:0 "Balance the Budget"
 USA_gop_balanced_budget_desc:0 "The Republicans need no platform committee to tell them what they believe about deficits: a government that spends beyond its means is a government that mortgages its children to its own present appetite. The ledger must be brought to balance, the borrowing stopped, and the currency kept honest."
 USA_gop_business_restoration:0 "Restore Business Confidence"
 USA_gop_business_restoration_desc:0 "Four years of New Deal rhetoric have sent capital to ground like a frightened animal. The counting-houses of New York and New Jersey want a signal that Washington has stopped treating success as a crime, and the party of business means to send it: the factories will return when the climate invites them back."
 USA_gop_commitment:0 "The Grand Old Party"
 USA_gop_commitment_desc:0 "Tested by the worst economic calamity in living memory and reduced in Congress to a corporal's guard, the Republican Party has not broken and it has not surrendered. Its faith in limited government, sound money, and the productive energies of free men is not an accident of prosperity; it is a conviction that has outlasted the crash, and will outlast the New Deal."
 USA_gop_america_first:0 "America First"
 USA_gop_america_first_desc:0 "Europe's quarrels are Europe's to settle. The party's State Department believes it with every fiber, and the polling maps agree: from the small towns of the Midwest to the German-American wards of the great cities, the demand is the same. Keep America out. The Atlantic and Pacific are the widest moats ever dug, and the country proposes to use them."
 USA_gop_neutrality_acts_teeth:0 "The Neutrality Acts With Teeth"
 USA_gop_neutrality_acts_teeth_desc:0 "No loans. No convoys. No expeditionary forces. The Neutrality Acts are not a polite suggestion but the settled law of the land, and the Republican Congress means to keep them that way. If the democracies of Europe cannot defend themselves without American money and American blood, the fault is their own improvidence and not a bill America is obliged to pay."
 USA_gop_fortress_america:0 "Fortress America"
 USA_gop_fortress_america_desc:0 "If the country will not go out to meet the world's wars, it must at least be prepared to repel them. The coasts are fortified, the harbors are armed, and the hemisphere is organized as a single defensive system: two oceans guarded by a navy built for the purpose and a home army that can make any landing costly beyond calculation."
 USA_gop_hemisphere_patrol:0 "The Monroe Doctrine Enforced"
 USA_gop_hemisphere_patrol_desc:0 "No European power shall plant a new foothold in the Americas. The Monroe Doctrine is a century old and the Navy is prepared to enforce it with the same quiet assurance with which it was proclaimed. From the Aleutians to the Falklands, the hemisphere is American business, and the patrol fleets know where the line is drawn."
 USA_gop_armed_neutrality:0 "Armed Neutrality"
 USA_gop_armed_neutrality_desc:0 "A nation that is prepared is a nation that can afford to wait. The party believes that America can stay out of the war, but only if it is strong enough that no belligerent calculates it worth the trouble to bring in. The arsenals are stocked, the forts are manned, and the country watches the carnage abroad with grim resolve to keep its distance."
 USA_gop_reluctant_crusade:0 "The Reluctant Crusade"
 USA_gop_reluctant_crusade_desc:0 "War has come whether the party willed it or not, and the Republic's Republicans do not shirk from its demands. But they go in under no illusions about crusades and no promises of a remade world: they fight to win, to come home, and to see that the emergency does not become the permanent condition of the Republic."
 USA_gop_war_on_our_terms:0 "War on Our Terms"
 USA_gop_war_on_our_terms_desc:0 "The party of efficiency takes its seat at the war council. Republican governors and senators have always known how to build and manage large organizations; what the war effort needs above all is production, logistics, and a steady hand on the industrial machinery. The GOP proposes to provide it, and to ensure that when the peace comes, the party is there to negotiate it."
 USA_gop_dewey_dawn:0 "Dewey for President"
 USA_gop_dewey_dawn_desc:0 "Governor Thomas E. Dewey of New York has broken more rackets and sent more criminals to prison than any prosecutor in the country's history, and the party believes a nation tired of improvisation is ready for a man who makes the trains run on time. The '44 convention is being organized, the county chairmen are being called, and the Grand Old Party is preparing to remind the country that it remembers how to govern."

 # --- GOP wing spirits (Task 7: 1936-44) ---
 USA_gop_fiscal_discipline_spirit:0 "Fiscal Discipline"
 USA_gop_fiscal_discipline_spirit_desc:0 "The budget is coming into balance and the borrowing is slowing: the markets breathe more easily, the bond-holders are reassured, and the quiet confidence that builds factories is returning to the boardrooms."
 USA_gop_america_first_spirit:0 "America First"
 USA_gop_america_first_spirit_desc:0 "The foreign entanglements are unwound, the neutrality machinery is running at full power, and the country turns its face inward. There is work enough at home, and the oceans are wide."
 USA_gop_neutrality_fortress_spirit:0 "Neutrality Fortress"
 USA_gop_neutrality_fortress_spirit_desc:0 "The legal architecture of non-entanglement is locked and bolted: no loans, no convoys, no expeditionary commitments. The Republic is armed and watchful and resolutely alone."
 USA_fortress_america_spirit:0 "Fortress America"
 USA_fortress_america_spirit_desc:0 "The coasts are fortified and the harbors are armed. Whatever comes across the ocean must first fight its way past steel and concrete built deliberately for the purpose."
 USA_hemisphere_defense_spirit:0 "Hemisphere Defense"
 USA_hemisphere_defense_spirit_desc:0 "The whole western hemisphere is organized as a single defensive system under American leadership. The patrol fleets know the coastlines and the Monroe Doctrine has teeth."
 USA_gop_hemisphere_patrol_spirit:0 "Monroe Doctrine Enforced"
 USA_gop_hemisphere_patrol_spirit_desc:0 "The Navy's patrol routes run from the Aleutians to the River Plate. Any foreign power that covets a New World foothold will find the calculation very expensive indeed."
 USA_gop_war_effort_spirit:0 "Republican War Management"
 USA_gop_war_effort_spirit_desc:0 "The party of efficiency has its hands on the war machine. Production schedules are met, contracts are audited, and the enormous industrial effort proceeds with something approaching discipline."

 # --- GOP wing spirits (Task 7: 1945-56) ---
 USA_gop_demobilization_spirit:0 "Bring the Boys Home"
 USA_gop_demobilization_spirit_desc:0 "The armies are coming home and the economy is turning gratefully to peace. The factories retool, the GI loans are spent on ranch houses, and the country draws a long breath of uncomplicated relief."
 USA_gop_latin_trade_spirit:0 "Western Hemisphere Trade Bloc"
 USA_gop_latin_trade_spirit_desc:0 "From the Rio Grande to Tierra del Fuego the Americas are learning to trade with one another under American terms. The arrangement suits Washington very well and the partners well enough."
 USA_gop_mccarthy_spirit:0 "McCarthyism"
 USA_gop_mccarthy_spirit_desc:0 "The junior senator from Wisconsin has discovered that the country will attend to almost any accusation if it is delivered with sufficient volume. The files are growing, the reputations are falling, and the administration is uncomfortably aware that the man with the list is not its friend, and cannot easily be stopped."
 USA_gop_bipartisan_containment_spirit:0 "Bipartisan Containment"
 USA_gop_bipartisan_containment_spirit_desc:0 "The senior senator from Michigan has declared that politics stops at the water's edge, and the declaration has carried the day. Democrats and Republicans alike are funding the containment of Soviet expansion, and the argument now is about how, not whether."
 USA_gop_dynamic_conservatism_spirit:0 "Dynamic Conservatism"
 USA_gop_dynamic_conservatism_spirit_desc:0 "The President calls it dynamic conservatism, and what he means is that the government will not dismantle the New Deal but will run it more efficiently, more honestly, and without the ideological excitement that makes businessmen nervous. The country seems to find this an excellent arrangement."

 # --- GOP wing, 1945-56 ---
 USA_gop_mr_republican:0 "Mr. Republican"
 USA_gop_mr_republican_desc:0 "Senator Robert Alphonso Taft of Ohio is the Republican Party's conscience, its anchor, and its most reliable source of inconvenience to men who want easy answers. He opposed the League of Nations and he will oppose NATO; he opposed the wartime draft and will oppose the peacetime one; but his opposition to every entanglement abroad comes from the same source as his opposition to every expansion of government at home: a principled suspicion of power exercised beyond its proper limits."
 USA_gop_eastern_establishment:0 "The Eastern Establishment"
 USA_gop_eastern_establishment_desc:0 "Wall Street lawyers, Ivy League trustees, and the editorial boards of the great Eastern newspapers have not given up on the Republican Party, however many primaries the Midwesterners win. Their man is an internationalist, their money is real, and their connections run through every major institution in the country. They believe, with the particular confidence of men who have never had to doubt their own importance, that America cannot withdraw from the world, and that the party that tries to do so will be punished at the polls."
 USA_gop_fortress_doctrine:0 "Fortress Doctrine"
 USA_gop_fortress_doctrine_desc:0 "The Senator from Ohio does not trust the Truman Doctrine, does not trust NATO, and does not trust the proposition that American security requires a permanent military establishment in Europe and Asia. He trusts the Navy, trusts the Bomb, and trusts the two oceans that kept the Republic safe for a hundred and sixty years before anyone thought of a State Department to mismanage its foreign relations."
 USA_gop_bring_the_boys_home:0 "Bring the Boys Home"
 USA_gop_bring_the_boys_home_desc:0 "The armies must come home, and home quickly, before the generals and the permanent bureaucrats of the National Security State develop a professional interest in keeping them abroad. Rapid demobilization will be painful in the short run and restorative in the long: the factories will retool, the men will find work, and the Republic will breathe freely again once it stops paying for an empire it does not need."
 USA_gop_hemisphere_imperium_light:0 "Western Hemisphere Imperium"
 USA_gop_hemisphere_imperium_light_desc:0 "If America must lead somewhere, let it lead in its own hemisphere. The Senator believes in a regional order under American protection and American trade terms: close enough to be useful, far enough from Eurasian complications to avoid another expeditionary army. The Latin republics will receive investment and guaranteed markets; Washington will receive raw materials, cooperation, and the satisfaction of a sphere of influence that asks little of the Treasury."
 USA_gop_mccarthy_unleashed:0 "McCarthy Unleashed"
 USA_gop_mccarthy_unleashed_desc:0 "The junior senator from Wisconsin has taken the floor and is reading names. Communists in the State Department, in the Army, in the universities, in the labor unions: the list keeps growing because no list can be proven complete. The Justice Department's files are opened, the hearings begin, and the country learns how many of its institutions can be made to feel ashamed of themselves when the microphones are turned on."
 USA_gop_vandenberg_moment:0 "The Vandenberg Moment"
 USA_gop_vandenberg_moment_desc:0 "Senator Arthur Vandenberg of Michigan has crossed the aisle and taken the Republicans with him: there will be bipartisan support for the Marshall Plan, for NATO, for the whole apparatus of containment, because the Senator has decided that the Soviet threat is real and that politics must stop at the water's edge. Taft is furious. The Senate is grateful. The decision is made."
 USA_gop_ike_draft:0 "Draft Eisenhower"
 USA_gop_ike_draft_desc:0 "The Establishment has found its candidate and his name is Eisenhower. The General has no enemies, no record to defend, no ideology to apologize for, and a grin that has been closing parades since North Africa. He is everything the Republican Party needs: internationally respectable, fiscally cautious, and impossible to dislike. The county chairmen are being told who to vote for, and the convention floor is being organized. Dwight D. Eisenhower is going to be the Republican nominee for President of the United States."
 USA_gop_dynamic_conservatism:0 "Dynamic Conservatism"
 USA_gop_dynamic_conservatism_desc:0 "The President has a name for what he is doing: dynamic conservatism, by which he means that the federal government will not be dismantled but will be run with the competence and restraint that a professional army commander brings to any large organization. No fireside chats; no grand programs; no ideology. Just management, and the steady accumulation of a prosperity that speaks for itself."
 USA_gop_mccarthy_censured:0 "The Senate Acts"
 USA_gop_mccarthy_censured_desc:0 "The junior senator from Wisconsin has at last gone too far, and the Senate has found its nerve. The censure resolution passes sixty-seven to twenty-two, and the era named for the man from Appleton is over. The files will be closed, the lists will be filed away, and the country will spend the next decade arguing about what exactly happened and who exactly permitted it to happen for as long as it did."

 # --- GOP events (Task 7) ---
 usa_cabinet.260.t:0 "Dewey for President"
 usa_cabinet.260.d:0 "Governor Dewey's people are on the telephone to every county chairman in the country, and the convention machinery is beginning to move. The Governor himself is at his desk in Albany working through case files, demonstrating with every passing hour that competence is a form of argument. The party is ready to be led by a man who can actually win, and Thomas E. Dewey believes he is that man."
 usa_cabinet.260.a:0 "Build the machine. Winning is a craft."
 usa_cabinet.260.b:0 "Press all the way. The White House is within reach."
 usa_cabinet.261.t:0 "The General Comes Home"
 usa_cabinet.261.d:0 "SHAPE Headquarters in Paris is quiet tonight because its Supreme Commander is on a transatlantic telephone call with the Republican National Committee, telling the chairman, with the careful courtesy of a man who has spent forty years giving orders without raising his voice, that yes, he will accept the nomination. The Democrats can nominate their eloquent Governor; the Republicans will nominate the man who planned the liberation of Western Europe and then stayed to organize its defense. The convention hall is already full of 'I Like Ike' buttons."
 usa_cabinet.261.a:0 "The General takes command of the party."

 # ============================ RADICAL WING (TASK 8) ============================

 # --- RAD wing, 1936-44 ---
 USA_rad_voices:0 "Voices of Discontent"
 USA_rad_voices_desc:0 "Every radio station carries a prophet of the people: the silver-voiced Senator from Louisiana who promises every man a king's share of the national wealth, the radio priest who has found a congregation of thirty million, the sit-down strikers who have discovered that a factory cannot run without its workers' consent. The Depression has not merely impoverished the country — it has radicalized it, and the voices of that radicalization are learning, for the first time, to speak to one another."

 USA_rad_share_our_wealth:0 "Share Our Wealth"
 USA_rad_share_our_wealth_desc:0 "Senator Huey P. Long of Louisiana has a plan, and it fits on a pamphlet: cap the fortunes of the rich at a million dollars, guarantee every American family an annual income, and use the surplus to build schools and pay pensions. The economists call it impossible and the newspapers call it dangerous, and the mail-room at the Senate office building handles ten thousand letters a week addressed, personally, to the Kingfish. There has not been a political movement this large in the country since the Populists, and the Populists never had the radio."

 USA_rad_popular_front:0 "The Popular Front"
 USA_rad_popular_front_desc:0 "In the union halls and the party offices the argument has been settled: the real enemy is fascism, and every force to the left of Wall Street must march together against it. The Communist Party is disciplined, the CIO has organizing money, and the intellectuals who have been drifting leftward since 1929 are ready to sign the manifestoes and staff the committees. A Popular Front is not a party and it is not a government, but it is a political force of the kind that can become one, and the men who built it know it."

 USA_rad_sit_down_wave:0 "The Sit-Down Wave"
 USA_rad_sit_down_wave_desc:0 "The workers of Flint, Michigan sit down inside General Motors and refuse to leave, and in six weeks they have won the right to organize — not because the law required it but because the factory could not run without them. The tactic spreads to steel, to rubber, to textiles, to the docks: fifty-six sit-downs in the first weeks of 1937 alone. Management has discovered that property rights are worth nothing if labor will not work, and labor has discovered that it is stronger than it knew."

 USA_rad_general_strike:0 "The General Strike"
 USA_rad_general_strike_desc:0 "What began in the factories has spread to the streets. A general strike is the final argument of organized labor, the proof that the economy runs on workers' consent and not employers' grace, and the question Washington faces is whether to crush it, negotiate it, or be swept aside by it. In San Francisco they know how this can go. In Washington they are about to find out."

 USA_rad_commitment:0 "The People's Front"
 USA_rad_commitment_desc:0 "The movement that began on the radio and in the union halls has become something new: a political majority with ambitions the old parties cannot satisfy. The People's Front is not the Democratic Party and it is not the Socialist Party — it is the coalescence of the American left into a single force, with a program, a constituency, and a demand that Washington reckon with it seriously, or make way."

 USA_rad_peoples_front_government:0 "The People's Front Government"
 USA_rad_peoples_front_government_desc:0 "The ballot is counted and the People's Front has won. Not a protest, not a third-party nuisance: an actual government, with the White House and enough of the Congress to govern. Now comes the harder question, the one every movement faces when it finally wins: what kind of government will it be? The democratic socialists want elections and legislation; the vanguard faction wants organization and command. The movement cannot serve two masters for long."

 USA_rad_workers_democracy:0 "Workers' Democracy"
 USA_rad_workers_democracy_desc:0 "The People's Front will govern democratically or it will not govern at all. Elections continue, the civil liberties are preserved, and the program advances through legislation rather than decree. The skeptics say you cannot change an economic order without breaking the rules that protect it; the democratic socialists answer that the rules are all that stand between a people's government and a tyranny, and they have not come this far to become what they defeated."

 USA_rad_economic_bill_of_rights:0 "An Economic Bill of Rights"
 USA_rad_economic_bill_of_rights_desc:0 "The political Bill of Rights was written in a time of quill pens and yeoman farmers, and it says nothing about whether a man has a job, a decent wage, or a doctor when his children fall sick. The second Bill of Rights addresses the rights the first one left out: a job, a living wage, decent housing, medical care, and a good education — not as charities but as constitutional guarantees, as firmly anchored in law as the right to speak freely. The republic is being rebuilt from the bottom."

 USA_rad_one_big_union:0 "One Big Union"
 USA_rad_one_big_union_desc:0 "Industrial unionism, not craft unionism: not the carpenters and the painters in separate halls but every worker in the plant in the same union, sitting at the same table, with the same card. The old AFL fought it for fifty years; the CIO built it anyway; and the People's Front is about to give it the force of law. One big union, representing everyone who works — and the republic that organized them will know where its true power lies."

 USA_rad_vanguard_path:0 "The Vanguard"
 USA_rad_vanguard_path_desc:0 "The lesson of history, the faction argues, is that you do not share power with the class that is trying to take it back. The People's Front will not be argued out of office by judges appointed for life, will not be voted out by newspapers owned by its enemies, and will not bargain away the revolution one concession at a time. The party takes its mandate as something more than an invitation to govern: it is a mandate to build the kind of state that cannot be undone."

 USA_rad_smash_the_reaction:0 "Smash the Reaction"
 USA_rad_smash_the_reaction_desc:0 "The committees have been sitting for weeks, the names are being read, and the apparatus of organized reaction — the company unions, the vigilante leagues, the bought judges and the red-baiting congressmen — is being systematically dismantled. The newspapers call it a purge. The party calls it necessary. The men in the dock call it persecution, and some of them are right, and some of them are guilty, and the party does not propose to stop long enough to sort out which is which."

 USA_rad_premature_antifascists:0 "Premature Antifascists"
 USA_rad_premature_antifascists_desc:0 "The People's Front warned them in 1936 and in 1937 and in 1938, and nobody in the editorial offices of the respectable press was listening. Now the flags are going up in capital after capital, and the men who marched in the Lincoln Brigade and the men who were blacklisted for saying it aloud turn out to have been right — not in retrospect, but in time. The United States is going to fight the fascists, and the radical left is going to fight them first."

 USA_rad_peoples_war:0 "The People's War"
 USA_rad_peoples_war_desc:0 "This is not a war of governments and armies; it is a war of peoples. The factory worker is a soldier now, and the partisan in the occupied city is a soldier, and the woman building bombers in the plant is a soldier, and all of them know what they are fighting for because the People's Front has been saying it for ten years. Antifascism was once a dirty word in the respectable press. Now it is the name of the war."

 # --- RAD wing spirits (Task 8: 1936-44) ---
 USA_rad_share_our_wealth_spirit:0 "Share Our Wealth"
 USA_rad_share_our_wealth_spirit_desc:0 "The Kingfish's program has found its way into policy: capped fortunes, guaranteed incomes, and a federal government that has stopped pretending that inequality is natural. The money is moving, and the men with the pamplets are satisfied."

 USA_rad_sit_down_disruption_spirit:0 "Factory Occupations"
 USA_rad_sit_down_disruption_spirit_desc:0 "The workers sit inside the machines and the machines do not run. Production is disrupted and management is frightened and the workers know, for the first time, exactly what they are worth to the economy that has been telling them they are replaceable."

 USA_rad_labor_force_spirit:0 "The Labor Force Organized"
 USA_rad_labor_force_spirit_desc:0 "The general strike has been won, or negotiated to a settlement that looks like a win, and the organized labor movement emerges stronger and more unified than it entered the confrontation. The workers are learning what they can do when they act together."

 USA_rad_people_state_spirit:0 "The People's State"
 USA_rad_people_state_spirit_desc:0 "The party is the state, and the state is the party, and the party is building something. The organizational apparatus runs from the village soviets to the Central Committee, and the men at the top have no intention of letting it unwind."

 USA_rad_workers_democracy_spirit:0 "Workers' Democracy"
 USA_rad_workers_democracy_spirit_desc:0 "The ballot is preserved and the rights are protected and the program advances through vote by vote, law by law. It is the slower road, and the vanguard faction says it is the road that does not arrive. The democratic socialists say it is the only road worth taking."

 USA_rad_economic_rights_spirit:0 "Economic Bill of Rights"
 USA_rad_economic_rights_spirit_desc:0 "The second constitution is enacted, the one that speaks to economic life rather than merely political life. No American is now entitled to be destitute; the republic has acknowledged an obligation it will not be permitted to forget."

 # --- RAD wing, 1945-56 ---
 USA_rad_third_camp:0 "The Third Camp"
 USA_rad_third_camp_desc:0 "An independent socialist America has no business choosing between Moscow and Wall Street. The Soviet Union is a workers' state deformed by Stalinist bureaucracy; the American empire is capitalism triumphant. The Third Camp is neither: it is the possibility of a socialism that keeps the ballot, the union, and the human conscience intact, and it makes its trade agreements and its peace proposals with any country willing to do business without ideological preconditions. The small nations of the world are watching to see if it is possible."

 USA_rad_economic_democracy:0 "Economic Democracy"
 USA_rad_economic_democracy_desc:0 "The political democracy is established and must now be matched by an economic one. Workers elect the boards of the major industries; the state holds the commanding heights; the market persists in its proper sphere, subordinate to the social plan. It is not the nationalization the Fabians dreamed of, and it is not the market the libertarians demand — it is the thing in between, the economic constitution of a people that has decided its government should be able to govern."

 USA_rad_red_half_century_dem:0 "The Red Half-Century"
 USA_rad_red_half_century_dem_desc:0 "Twenty years after the People's Front first took office, the balance sheet is legible at last: the industries are democratically managed, the social insurance covers every citizen, the unions are the strongest in the world, and the dollar is still the reserve currency because American productivity has earned it. The revolution, if it was a revolution, kept all the institutions it found and turned them to new purposes. The country that emerges is not unrecognizable — it is, in many ways, the America that the Founders promised and the Gilded Age postponed."

 USA_rad_comintern_pivot:0 "The Comintern Pivot"
 USA_rad_comintern_pivot_desc:0 "The postwar world is divided, and a vanguard state cannot stand aside from the division forever. The Soviet Union has rebuilt and is arming and is watching; Moscow has made its offer; and the question the vanguard party must answer is whether the American revolution is a chapter in world history or a national phenomenon. The internationalists argue that the class struggle does not respect borders and that the revolution is safer in company. The nationalists argue that American socialism cannot survive a Soviet patron, and the argument in the party headquarters grows sharp and personal."

 USA_rad_atomic_secrets_shared:0 "The Atomic Choice"
 USA_rad_atomic_secrets_shared_desc:0 "The secrets came from the Manhattan Project, and the scientists who built the bomb are not unanimous that only one country should hold it. Some of them believe that the knowledge belongs to humanity and will be shared sooner or later regardless. Others believe that a world in which only the United States holds the bomb is a world permanently under American ultimatum, and that a socialist America owes the workers of other countries the chance to deter the imperialists of their own. The choice is irreversible, and the world will feel it for decades."

 USA_rad_red_half_century_van:0 "The Vanguard Century"
 USA_rad_red_half_century_van_desc:0 "The party has held power for twenty years and it does not intend to surrender it to the first election it loses. The institutions of the old order — the Supreme Court, the electoral college, the two-party system — have been replaced by institutions of the people's state, and the people's state is proving, in practice, that it can build more and arm better and feed its citizens more reliably than the republic it replaced. The United States of America is officially renamed. What it becomes next depends on whether the party can keep the promise."

 USA_rad_peoples_war_memorial:0 "The People's War Memorial"
 USA_rad_peoples_war_memorial_desc:0 "The war ended years ago and the country has not yet finished mourning it. A memorial is not merely a monument; it is a political act, a decision about which war was fought and what it was fought for. This one says: it was the workers and the soldiers of the antifascist left who carried the weight, and the country owes them not merely gratitude but the completion of the society they believed they were fighting to build. The memorial opens on a Tuesday; by Friday the line to see it runs around the block."

 # --- RAD wing spirits (Task 8: 1945-56) ---
 USA_rad_third_camp_spirit:0 "The Third Camp"
 USA_rad_third_camp_spirit_desc:0 "An independent socialist republic, non-aligned and self-sufficient: it trades with Moscow when the terms are right and with London when the terms are right and with neither when they are not. The world's other socialists watch enviously."

 USA_rad_red_half_century_dem_spirit:0 "The Democratic Commonwealth"
 USA_rad_red_half_century_dem_spirit_desc:0 "The revolution that kept the ballot has kept its legitimacy, and after a generation the country it has built is prosperous, just, and reasonably free. The historians will argue about whether it deserved to succeed. The people living in it are not arguing."

 USA_rad_red_half_century_van_spirit:0 "The Vanguard State"
 USA_rad_red_half_century_van_spirit_desc:0 "The party-state has proven its capability: it builds, arms, and feeds, and it has no intention of stopping. The question the next generation will have to answer is whether capability without accountability can endure."

 # --- RAD events (Task 8: 1936-44) ---
 usa_cabinet.210.t:0 "The People's Front Takes Office"
 usa_cabinet.210.d:0 "The returns are in and they are unambiguous: the People's Front has won the presidency of the United States. In the union halls and the party offices the celebrations are already going, but in the back rooms the argument is already resuming — the argument that has never quite stopped since the movement began. What kind of government will it be? The movement has a majority; now it must decide what to do with it, and how it must decide is itself the first decision of consequence."
 usa_cabinet.210.a:0 "A democratic socialist government: the ballot is sacred."
 usa_cabinet.210.b:0 "The vanguard leads. The party must organize, not merely legislate."

 usa_cabinet.211.t:0 "The General Strike Showdown"
 usa_cabinet.211.d:0 "The strike is not a labor dispute anymore; it is a constitutional crisis. The strikers have shut down the ports, the railways, and half the city governments of the industrial belt, and the administration must answer the question that no one has asked out loud yet: which side is the government on? The police are waiting for orders. The National Guard is waiting for orders. The workers are waiting to find out if they won."
 usa_cabinet.211.a:0 "Negotiate. The workers' demands are the government's program."
 usa_cabinet.211.b:0 "Order must be restored, even at a cost."

 usa_cabinet.212.t:0 "The Purge"
 usa_cabinet.212.d:0 "The committees have their lists and the hearings are scheduled and the party has decided that the revolution will not be undone by the men who are trying to undo it. The opposition is being dismantled — legally where possible, administratively where necessary, and with the security apparatus where nothing else suffices. The press calls it a purge. The party calls it the necessary conclusion of a struggle that began in the boardrooms and the editorial offices of men who never accepted the election results."
 usa_cabinet.212.a:0 "The revolution protects itself. The elections are suspended."

 # --- RAD events (Task 8: 1945-56) ---
 usa_cabinet.213.t:0 "An Offer from Moscow"
 usa_cabinet.213.d:0 "The Soviet Foreign Ministry's note is politely phrased and its meaning is plain: Moscow recognizes the People's Front government as the legitimate government of the United States, and the Communist International — reconstituted since its wartime dissolution — extends a formal offer of fraternal solidarity and, if desired, faction membership. The vanguard party is being invited to the table of world communism. What happens at that table will depend on who sits down."
 usa_cabinet.213.a:0 "Accept the invitation. The revolution is international."
 usa_cabinet.213.b:0 "Remain independent. American socialism answers to Americans."

 usa_cabinet.214.t:0 "The Secret of the Bomb"
 usa_cabinet.214.d:0 "The Manhattan Project files are in the archives of a government that no longer belongs to the men who classified them. The scientists who built the bomb are in the room — some of them were already party members — and the question is on the table: does a socialist America keep the atomic monopoly, or does it share the secret with its Soviet comrades on the grounds that no single state should have the power to end civilization? The decision will be felt for decades, and the moment for making it is now."
 usa_cabinet.214.a:0 "Share the secret. Solidarity is not a slogan."
 usa_cabinet.214.b:0 "Hold the secret. Even allies must be balanced."

 # --- RAD leaders ---
 USA_norman_thomas_desc:0 "The Presbyterian minister turned socialist candidate, who ran for President six times and never won and shaped the country's politics more profoundly than most men who did."
 USA_earl_browder_desc:0 "The Kansas-born general secretary of the Communist Party of America, who dissolved the party into a political association during the war and found himself, to his own astonishment, leading a government."

 ###########################################################################
 # AUTH WING FOCUSES (Task 9: 1936-44)
 ###########################################################################

 USA_auth_whispers:0 "Whispers in the Gallery"
 USA_auth_whispers_desc:0 "The Bonus Army was gassed and scattered, but it did not disperse. Veterans who marched on Washington in 1932 and went home in humiliation are still talking. In the armories and the American Legion halls and the back rooms of certain clubs, the talk has a different tone: not petition but ultimatum, not patience but readiness. The democracy that abandoned its soldiers has not earned their gratitude, and the men who never stopped talking are beginning to find one another."

 USA_auth_veterans_grievance:0 "The Veterans' Reckoning"
 USA_auth_veterans_grievance_desc:0 "A quarter of a million men served the Republic overseas and came home to a breadline. MacArthur's troops rode horses into the Bonus March and torched the veterans' shacks under orders from the same government that sold the soldiers their Liberty Bonds. The debt is not forgotten, and the men who remember it are organizing under leaders who promise that the next government will not treat its veterans as an inconvenience to be dispersed."

 USA_auth_business_backers:0 "The Money Behind the Movement"
 USA_auth_business_backers_desc:0 "The New Deal is a threat to property and the men who hold it know it. Certain industrialists, certain bank directors, certain partners in certain law firms have concluded that the democratic process, as currently constituted, is not going to protect what they built. They are not yet ready to march in the streets. They are ready to write checks, make introductions, and look the other way when the movement requires resources that cannot be accounted for on a balance sheet."

 USA_auth_business_plot:0 "The Business Plot"
 USA_auth_business_plot_desc:0 "The plan is circulating in boardrooms and officers' clubs: the right general, the right money, the right moment. The retired Marine commandant who was approached and refused will not stay quiet forever, and the plan has to move before it leaks. The industrialists have named their general and the general has not said no. A coup requires only that enough people in the right positions decide that the alternative is worse."

 USA_auth_silver_legion:0 "The Silver Legion"
 USA_auth_silver_legion_desc:0 "William Dudley Pelley's Silver Shirts have been marching for three years. They have a newspaper, a radio hour, a theology of Christian nationalism, and a theory of the state that does not include elections after the first one. The movement is not respectable and does not wish to be. It wants power, and it has concluded that power does not require respectability — only numbers, conviction, and the willingness to use what you have when the moment comes."

 USA_auth_commitment:0 "The American Caesar"
 USA_auth_commitment_desc:0 "The Republic ends not with a battle but with a transfer of authority that most of the country does not yet understand has happened. The general accepts the command or the prophet mounts the steps, and the cabinet ministers who do not resign are told they will serve at pleasure — and that the pleasure may not last long. The newspapers are still printing. The Supreme Court is still sitting. The elections are not yet canceled, only postponed indefinitely. The democratic forms remain. The democratic substance is gone."

 USA_auth_crush_labor:0 "The Broken Union"
 USA_auth_crush_labor_desc:0 "The sit-down strikes and the organizing drives and the CIO's claims to recognition were the New Deal's greatest concession to the working class. The new order does not negotiate. The picket lines are dispersed, the organizers arrested or fled, the contracts voided by executive decree. The factory floor is reorganized for output and the question of who owns the output is no longer a question that labor is permitted to raise. Production climbs. The workers have not stopped working — they have only stopped being asked whether they consent."

 USA_auth_new_order_at_home:0 "The New Order at Home"
 USA_auth_new_order_at_home_desc:0 "Every republic has an attorney general. The difference is what the attorney general is for. This one is for the state. The immigration files, the domestic surveillance rosters, the postal inspection records, and the files that J. Edgar Hoover has been keeping for a decade are now available to an administration that does not feel constrained by the Bill of Rights in the way that previous administrations did. The new order needs a security apparatus and the security apparatus is being built."

 USA_auth_loyalty_oaths:0 "Loyalty Oaths"
 USA_auth_loyalty_oaths_desc:0 "Every federal employee takes the oath. Every officer renews it. Every schoolteacher, every professor at a land-grant university, every postal clerk swears loyalty to the new order and to its leader. The committees that review the oaths are thorough and the standards for disqualification are flexible. Dissent is a form of disloyalty and loyalty is the first requirement of continued employment. The country grows quieter. The opposition grows more careful. This is not an accident."

 USA_auth_press_brought_to_heel:0 "The Press Brought to Heel"
 USA_auth_press_brought_to_heel_desc:0 "The newspapers that called it a coup are discovering the limits of press freedom in a state that controls newsprint allocation and broadcast license renewals. The editors who resisted are retired or absent. The columnists who remain understand that the story they write today determines whether they are asked to write tomorrow. The new order does not need censorship in the crude sense — it needs editors who understand the situation, and it is getting them."

 USA_auth_hemisphere_destiny:0 "Hemisphere Destiny"
 USA_auth_hemisphere_destiny_desc:0 "Monroe was right about the hemisphere belonging to the Americas, but he was insufficiently clear about which Americans. The doctrine is being updated. Caribbean governments that depend on American sugar quotas and security guarantees are discovering that the new conditions of those arrangements are more explicit than they used to be. The Caesar does not ask permission from a neighbor. He asks for compliance and then waits a reasonable interval before obtaining it by other means."

 USA_auth_good_neighbor_with_teeth:0 "The Good Neighbor With Teeth"
 USA_auth_good_neighbor_with_teeth_desc:0 "Roosevelt called it the Good Neighbor Policy. The new order calls it spheres of responsibility. The neighbors will be protected — protected by the United States, from threats that the United States will define, on terms that the United States will set. The offer is being made in the polite language of diplomatic correspondence. The alternative to accepting the offer is not articulated in the correspondence, but the naval squadron in the harbor makes the alternative clear enough."

 USA_auth_war_on_our_schedule:0 "War on Our Schedule"
 USA_auth_war_on_our_schedule_desc:0 "The Caesar does not wait for war to come to him. He chooses his moment, prepares his armies, selects his enemies, and moves when the calculation is favorable. The new order does not share the democracies' aversion to initiative; it regards war as an instrument of policy and policy as the extension of power by whatever means are necessary. The question is not whether there will be a war. The question is where and when."

 ###########################################################################
 # AUTH WING FOCUSES (Task 9: 1945-56)
 ###########################################################################

 USA_auth_pax_americana:0 "Pax Americana"
 USA_auth_pax_americana_desc:0 "The war is over and the hemisphere is ours and the question is what we do with it. The old order of nation-states and self-determination and international law is over; the new order is organized around American power and American interests, which are, by definition, the interests of order. The Caesar is not modest about the implications. A peace imposed by strength is still a peace, and the alternative to American hegemony is not an international community of equal nations — it is chaos, and chaos is the enemy of the peace that the Caesar is offering."

 USA_auth_tribute_system:0 "The Tribute System"
 USA_auth_tribute_system_desc:0 "The weaker nations of the hemisphere pay. They pay in raw materials priced below the market rate. They pay in favorable investment terms that reserve the extractive industries for American capital. They pay in deference: their foreign ministers come to Washington and their ambassadors wait in the lobby. The ledger is always in America's favor and the accounting is never reviewed by any body that the weaker nations are permitted to address. This is called free trade."

 USA_auth_legions_overseas:0 "Legions Overseas"
 USA_auth_legions_overseas_desc:0 "The Roman precedent is not lost on the officers who design the basing strategy. A dozen installations in a dozen countries, each one a reminder of the cost of resistance and a guarantee of the price of compliance. The garrisons are not large — they do not need to be large. They need only to be present, and the flag flying over the compound at Puerto Cortés or the airstrip outside Panama City or the naval station at Guantánamo is sufficient to make the political argument without anyone having to say it out loud."

 USA_auth_atomic_diplomacy:0 "Atomic Diplomacy"
 USA_auth_atomic_diplomacy_desc:0 "The bomb changes the conversation. Before the bomb, a threat had to be backed by armies and logistics and time; a small power could calculate the cost of American intervention and decide that the cost was worth bearing. After the bomb, the calculation is different. The Caesar does not threaten in public — public threats are for regimes that lack confidence. He mentions, in private meetings, that the United States has capabilities it has not yet fully explored, and that the world would benefit from an early opportunity to understand what those capabilities mean for the conduct of foreign policy."

 USA_auth_imperium:0 "The Imperium"
 USA_auth_imperium_desc:0 "The United States of America is a name from a different century — a name from the era of self-evident truths and consent of the governed and the proposition that all men are created equal. The new order proposes a different name, a different theory, and a different flag, or at least a different legend on the same flag. The New Republic is proclaimed in a ceremony that is carried on every radio frequency the state controls. The historians will argue about the date. The people watching the ceremony know that the argument about what the country is has been resolved, and that they lost."

 USA_auth_succession_question:0 "The Succession Question"
 USA_auth_succession_question_desc:0 "The Caesar built his order around himself and the order is discovering the problem with that approach. The junta men and the movement men have different ideas about who comes next and neither faction is willing to concede the question to the other. The instability is not yet public — the newspapers print what they are told — but in the ministries and the general staff headquarters and the party offices the argument is open and the argument has started to look like something that requires resolution before it resolves itself in a way that no one intended."

 ###########################################################################
 # AUTH WING SPIRITS (Task 9)
 ###########################################################################

 USA_auth_business_backers_spirit:0 "The Business Coalition"
 USA_auth_business_backers_spirit_desc:0 "The movement's industrial patrons provide capital, legal cover, and access to the boardrooms of America's largest corporations. In exchange they expect a government that understands the relationship between property and order."

 USA_auth_labor_crushed_spirit:0 "The Broken Union"
 USA_auth_labor_crushed_spirit_desc:0 "The organized labor movement has been dismantled. Factory output rises without the friction of negotiation. The workers have not stopped working — they have only stopped being asked."

 USA_auth_security_state_spirit:0 "The Security Apparatus"
 USA_auth_security_state_spirit_desc:0 "The attorney general's office and the internal security services have been reorganized to serve the new order. Surveillance is systematic. Dissent is tracked. The opposition does not disappear — it becomes very careful."

 USA_auth_loyalty_oaths_spirit:0 "Loyalty Administered"
 USA_auth_loyalty_oaths_spirit_desc:0 "Every federal employee has sworn the oath. The committees review the files. Stability comes not from consensus but from the knowledge that dissent is disqualifying, and everyone knows it."

 USA_auth_press_control_spirit:0 "The Compliant Press"
 USA_auth_press_control_spirit_desc:0 "The newspapers print what they are told. The editors who remain understand the situation. This is not censorship in the crude sense — it is the natural result of a press that has learned, through experience, where the line is."

 USA_auth_tribute_spirit:0 "The Tribute System"
 USA_auth_tribute_spirit_desc:0 "The hemisphere's weaker nations pay in materials, investment access, and deference. The ledger is always in Washington's favor."

 USA_auth_overseas_bases_spirit:0 "Forward Legions"
 USA_auth_overseas_bases_spirit_desc:0 "American garrisons scattered across the hemisphere and the Pacific make the argument for compliance without anyone having to say it out loud."

 USA_auth_pax_spirit:0 "Pax Americana"
 USA_auth_pax_spirit_desc:0 "The new order calls it peace. The order is American, the terms are American, and the enforcement is American. Whether the neighbors call it peace is not a question they are invited to answer publicly."

 USA_auth_imperium_spirit:0 "The New Republic"
 USA_auth_imperium_spirit_desc:0 "The old names have been replaced. The ideology is permanent. The historians will argue about what it was — the people who live under it call it the way things are."

 ###########################################################################
 # AUTH EVENTS (Task 9)
 ###########################################################################

 usa_cabinet.215.t:0 "Caesar's Ascent"
 usa_cabinet.215.d:0 "The Republic ends not with a cannon shot but with a transfer of authority that most of the country does not yet understand has happened. The general accepts the command or the prophet mounts the steps, and the men who might have stopped it have decided — or been persuaded, or arrested — not to try. The flag still flies. The Supreme Court is still sitting, for now. The newspapers are still printing. But the president who sits in the Oval Office answers to no one who was elected, and the next election has been postponed indefinitely, pending the resolution of the current emergency, which will not be resolved."
 usa_cabinet.215.a:0 "The General commands. MacArthur takes the chair."
 usa_cabinet.215.b:0 "The Prophet leads. Pelley's movement has its moment."

 usa_cabinet.216.t:0 "The Labor Crackdown"
 usa_cabinet.216.d:0 "The strikes are over. The sit-down occupation at Flint lasted two months; the new administration's patience lasted two weeks. The order has been given and the question is only what kind of order it will be — the brutal kind that leaves the organizers in a hospital, or the managed kind that leaves them in a courtroom. Both options accomplish the same thing. The factories will run. The question is how many people get hurt on the way to that conclusion."
 usa_cabinet.216.a:0 "Brutal. The clubs come out. The organizers are made examples."
 usa_cabinet.216.b:0 "Managed. Courts, injunctions, yellow-dog contracts. The result is the same, more slowly."

 usa_cabinet.217.t:0 "The Good Neighbor's Offer"
 usa_cabinet.217.d:0 "The communiqué from Washington arrives in the foreign ministries of Central America and the Caribbean on the same day, which is not a coincidence. The language is diplomatic and the meaning is plain: American protection is being extended to the region, on terms to be specified in follow-on negotiations, at Washington's convenience. The neighbors understand that this is not a request. The question is whether to accept the terms that are being offered or to wait and discover what the terms become when the naval squadron arrives."
 usa_cabinet.217.a:0 "Extend the arrangement to Mexico. The offer is made."
 usa_cabinet.217.b:0 "A naval demonstration first. The argument precedes the conversation."

 usa_cabinet.218.t:0 "The Bomb as Leverage"
 usa_cabinet.218.d:0 "The secretary of war's briefing is thorough and the conclusion is not difficult to reach: the United States holds the only atomic weapons in existence, and no one else will have them for years, and the window in which the monopoly is absolute is the window in which American diplomacy can accomplish things that it could not accomplish without the bomb and will not be able to accomplish once others have it. The Caesar is being asked to decide what to do with the window. The decision will be felt for a generation."
 usa_cabinet.218.a:0 "Deliver the ultimatum. The minor power will comply or face the consequences."
 usa_cabinet.218.b:0 "The prestige demonstration. Show the capability. Say nothing further."

 usa_cabinet.219.t:0 "The New Republic"
 usa_cabinet.219.d:0 "The ceremony is brief and the broadcast is long. The old name is retired; the new name is announced; the ideological foundation of the new order is stated plainly for the first time in public, without the euphemisms that the transition period required. The New Republic is not the United States of America. It is what the United States of America has become, which is a different thing, and the difference has been official for seven minutes, and the world is learning what to call it."
 usa_cabinet.219.a:0 "The New Republic is proclaimed. The old names are retired."

 usa_cabinet.220.t:0 "The Succession Crisis"
 usa_cabinet.220.d:0 "The argument in the ministries and the general staff headquarters has been going on for months and it has not been resolved and the Caesar is either unable or unwilling to resolve it. The junta men want a soldier. The movement men want a believer. Both factions have files on the other faction and both factions know that the files exist and neither faction is prepared to strike first because neither faction is certain it would win. The country does not know about this argument. The newspapers know better than to print it. But the country is starting to sense that something is wrong."
 usa_cabinet.220.a:0 "Iron fist. Purge the rivals. Pay the cost in political capital."
 usa_cabinet.220.b:0 "Concession. Allow a faction influence. Buy time."

 ###########################################################################
 # AUTH LEADERS (Task 9)
 ###########################################################################

 USA_macarthur_auth_desc:0 "The general who dispersed the Bonus March and believes it was the right decision. He has been waiting for his moment for fifteen years and he has concluded that the democratic process is not going to provide it."
 USA_pelley_auth_desc:0 "The publisher, astrologer, and self-proclaimed messiah who founded the Silver Shirts in 1933 and has been building toward this moment ever since. He believes the country has a destiny and that he is its instrument."

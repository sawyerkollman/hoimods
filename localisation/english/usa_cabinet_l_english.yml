l_english:

 # ============================ FOCUSES ============================

 # --- Economic spine ---
 USA_a_nation_rebuilds:0 "A Nation Rebuilds"
 USA_a_nation_rebuilds_desc:0 "The depths of the Depression are behind us, but recovery is fragile. The federal government must keep its hand on the tiller and restore the confidence of the American people."
 USA_relief_programs:0 "Relief Programs"
 USA_relief_programs_desc:0 "The WPA and the CCC have put millions back to work. Expanding direct relief will ease suffering and build the infrastructure of a modern nation."
 USA_public_works:0 "Public Works"
 USA_public_works_desc:0 "Dams, highways, and power lines will knit the country together and lay the groundwork for the industry of tomorrow."
 USA_the_second_new_deal:0 "The Second New Deal"
 USA_the_second_new_deal_desc:0 "A bolder program of reform: labor rights, social insurance, and a permanent role for government in the economy. The old order will not go quietly."
 USA_social_security_expansion:0 "Social Security Expansion"
 USA_social_security_expansion_desc:0 "Broaden the safety net so that no American need fear destitution in old age, sickness, or unemployment. The progressive wing of the party will be emboldened."
 USA_industrial_relations:0 "Industrial Relations"
 USA_industrial_relations_desc:0 "Bring labor and management to the same table. Stable, productive factories are the bedrock of national strength."
 USA_a_managed_economy:0 "A Managed Economy"
 USA_a_managed_economy_desc:0 "The lessons of the Depression are clear: the market alone cannot be trusted. A coordinated industrial policy will keep the engines of production humming."

 # --- The Brain Trust / Cabinet ---
 USA_the_brain_trust:0 "The Brain Trust"
 USA_the_brain_trust_desc:0 "The President governs through an inner circle of trusted advisors and cabinet secretaries. Assemble that circle, and the men you choose will shape the destiny of the Republic. Their rivalry between progressive reformers and the Old Guard will define your administration."
 USA_secretary_of_state:0 "The State Department"
 USA_secretary_of_state_desc:0 "The Secretary of State carries the voice of America to the world. Will it speak of engagement, or of splendid isolation?"
 USA_appoint_hull:0 "Appoint Cordell Hull"
 USA_appoint_hull_desc:0 "A committed internationalist and architect of reciprocal trade. Hull will draw America closer to the wider world and lend the cabinet a progressive, outward-looking voice."
 USA_appoint_isolationist_state:0 "Appoint an Isolationist"
 USA_appoint_isolationist_state_desc:0 "Let the State Department be led by a man who believes Europe's quarrels are not ours. America's strength lies in keeping clear of foreign entanglements."
 USA_secretary_of_treasury:0 "The Treasury"
 USA_secretary_of_treasury_desc:0 "Who holds the purse strings holds the future. The Treasury will decide whether the New Deal endures or yields to the demands of business."
 USA_appoint_morgenthau:0 "Appoint Henry Morgenthau"
 USA_appoint_morgenthau_desc:0 "A loyal New Dealer and the President's close friend. Morgenthau will fund relief and public works without hesitation, strengthening the progressive cabinet."
 USA_appoint_business_treasury:0 "Appoint a Man of Business"
 USA_appoint_business_treasury_desc:0 "A sound-money conservative who speaks the language of Wall Street. Industry will flourish under his stewardship, though the reformers will grumble."
 USA_secretary_of_war:0 "The War Department"
 USA_secretary_of_war_desc:0 "Storm clouds gather over Europe and Asia. The Secretary of War must decide whether America prepares for the worst or trusts in its oceans."
 USA_appoint_stimson:0 "Appoint Henry Stimson"
 USA_appoint_stimson_desc:0 "An elder statesman and unflinching interventionist. Stimson will ready the army for a war he believes is coming, and align the cabinet with the President's resolve."
 USA_appoint_woodring:0 "Appoint Harry Woodring"
 USA_appoint_woodring_desc:0 "An isolationist who opposes foreign adventures. He will keep the army lean and the budget modest, reassuring those who fear another European war."
 USA_attorney_general:0 "The Department of Justice"
 USA_attorney_general_desc:0 "The Attorney General guards the home front. Civil liberties or national security; the choice will echo through the coming storm."
 USA_appoint_murphy:0 "Appoint Frank Murphy"
 USA_appoint_murphy_desc:0 "A champion of civil liberties and the rights of labor. Murphy will hold the administration to its highest ideals and reinforce the progressive bloc."
 USA_appoint_security_ag:0 "Appoint a Security Hawk"
 USA_appoint_security_ag_desc:0 "In dangerous times, the Republic must be defended from within as well as without. A firm hand will root out subversion, whatever the cost to dissent."
 USA_the_inner_circle:0 "The Inner Circle"
 USA_the_inner_circle_desc:0 "Your cabinet is complete. These are the men who will counsel the President in the crises to come, each pulling the administration toward his own vision of America."
 USA_progressive_ascendancy:0 "Progressive Ascendancy"
 USA_progressive_ascendancy_desc:0 "The reformers have won the inner struggle. The New Deal will not be rolled back; it will be deepened, and America's promise extended to all her people."
 USA_conservative_resurgence:0 "Conservative Resurgence"
 USA_conservative_resurgence_desc:0 "The Old Guard has reasserted itself. Order, enterprise, and tradition will guide the nation, and the experiments of the past decade will be reined in."
 USA_economic_bill_of_rights:0 "An Economic Bill of Rights"
 USA_economic_bill_of_rights_desc:0 "The right to a job, a home, an education, and care in old age. Enshrine economic security as the birthright of every citizen."
 USA_a_cooperative_commonwealth:0 "A Cooperative Commonwealth"
 USA_a_cooperative_commonwealth_desc:0 "Push beyond reform toward a new social order, where the great industries serve the many rather than the few. A road no American president has dared to walk."
 USA_restore_the_old_republic:0 "Restore the Old Republic"
 USA_restore_the_old_republic_desc:0 "Sweep away the alphabet agencies and the regimented economy. Return to the constitutional order of limited government and free enterprise that made America great."
 USA_the_american_caesar:0 "The American Caesar"
 USA_the_american_caesar_desc:0 "In an age of strongmen, some whisper that the Republic itself is too weak for the times. A firm executive, unbound by the old restraints, could impose order on a fractured nation."

 # --- The Arsenal / Military ---
 USA_the_arsenal:0 "The Arsenal of Democracy"
 USA_the_arsenal_desc:0 "America's true power lies in her factories. Retool them for war production, and no nation on Earth can match the output of the Republic."
 USA_war_plan_revision:0 "War Plan Revision"
 USA_war_plan_revision_desc:0 "The color-coded war plans of the last war are obsolete. Modern doctrine for a modern army."
 USA_two_ocean_navy:0 "The Two-Ocean Navy"
 USA_two_ocean_navy_desc:0 "A republic with coasts on two oceans needs a fleet to match. Lay down the keels that will rule the Atlantic and the Pacific alike."
 USA_total_mobilization:0 "Total Mobilization"
 USA_total_mobilization_desc:0 "The hour has come. Throw the full weight of the American economy and people into the war effort. There will be no half-measures."
 USA_strategic_bombing:0 "Strategic Bombing"
 USA_strategic_bombing_desc:0 "Fleets of heavy bombers will carry the war to the enemy's heartland and shatter his capacity to fight."
 USA_amphibious_doctrine:0 "Amphibious Doctrine"
 USA_amphibious_doctrine_desc:0 "To win a war across the oceans, America must master the art of landing armies on hostile shores."
 USA_the_manhattan_project:0 "The Manhattan Project"
 USA_the_manhattan_project_desc:0 "In secret laboratories, the nation's finest minds pursue a weapon of unimaginable power. Whoever wields it first may end the war in an instant."
 USA_dawn_of_the_atomic_age:0 "Dawn of the Atomic Age"
 USA_dawn_of_the_atomic_age_desc:0 "The bomb is real. America stands alone atop a new and terrible age, and the world will never be the same."
 USA_scientific_establishment:0 "A Scientific Establishment"
 USA_scientific_establishment_desc:0 "Marshal the universities, the national laboratories, and the brightest minds of a generation. The wars of the future will be won in the laboratory as much as on the battlefield."
 USA_electronics_mastery:0 "Electronics Mastery"
 USA_electronics_mastery_desc:0 "Radar, computing, and precision electronics will give American forces an edge no enemy can match, and open the door to the technologies of a new age."
 USA_operations_research:0 "Operations Research"
 USA_operations_research_desc:0 "Bring scientific rigor to the management of war and industry itself. A dedicated research program lets America pursue more avenues of advancement at once."

 # --- Old World Ties / Diplomacy and the Post-War Order ---
 USA_old_world_ties:0 "Old World Ties"
 USA_old_world_ties_desc:0 "America cannot ignore the world forever. Decide how the Republic will engage with friends and rivals across the seas."
 USA_lend_lease_expansion:0 "Lend-Lease Expansion"
 USA_lend_lease_expansion_desc:0 "Become the great quartermaster of the democracies. Ships, tanks, and food will flow to those who stand against tyranny."
 USA_good_neighbor:0 "The Good Neighbor"
 USA_good_neighbor_desc:0 "Secure the Western Hemisphere through partnership rather than domination. A united Americas is a fortress no aggressor can breach."
 USA_the_grand_alliance:0 "The Grand Alliance"
 USA_the_grand_alliance_desc:0 "Forge an unbreakable coalition against the aggressors. Together, the free nations and their partners will see this struggle through to victory."
 USA_postwar_planning:0 "Postwar Planning"
 USA_postwar_planning_desc:0 "Even as the guns still fire, wise men must plan the peace. The mistakes that followed the last war must never be repeated."
 USA_bretton_woods:0 "Bretton Woods"
 USA_bretton_woods_desc:0 "Anchor the world economy to the dollar and build the institutions that will prevent another global collapse."
 USA_the_united_nations:0 "The United Nations"
 USA_the_united_nations_desc:0 "A new league of nations, this time with teeth and America at its heart. A forum to settle disputes before they become wars."
 USA_shape_the_peace:0 "Shape the Peace"
 USA_shape_the_peace_desc:0 "Victory brings responsibility. The map of the post-war world will be drawn in conference halls, and America will hold the pen."
 USA_marshall_plan:0 "The Marshall Plan"
 USA_marshall_plan_desc:0 "Pour American treasure into the rebuilding of a shattered world. Prosperous friends are the surest bulwark against extremism."
 USA_iron_curtain:0 "The Iron Curtain Descends"
 USA_iron_curtain_desc:0 "An old wartime partner has become a rival. From the Baltic to the Adriatic, a shadow falls across the continent, and a new struggle begins."
 USA_containment_doctrine:0 "The Containment Doctrine"
 USA_containment_doctrine_desc:0 "Wherever the rival power presses outward, America will be there to hold the line. Vigilance, alliances, and strength will keep the peace."
 USA_return_to_normalcy:0 "Return to Normalcy"
 USA_return_to_normalcy_desc:0 "The boys are home and the war is won. Let America turn inward, enjoy her prosperity, and leave the quarrels of the Old World behind."
 USA_demobilization:0 "Demobilization"
 USA_demobilization_desc:0 "Bring the armies home and beat the swords into plowshares. The Republic was never meant to keep millions under arms in peacetime."
 USA_permanent_establishment:0 "A Permanent Establishment"
 USA_permanent_establishment_desc:0 "The world remains dangerous. America must maintain a standing military and the industry to sustain it, ready for whatever comes."
 USA_the_american_century:0 "The American Century"
 USA_the_american_century_desc:0 "Industry, ideals, and the inner circle that guided us here. America stands at the summit of the world, the indispensable nation of a new age."

 # ============================ CABINET MEMBERS ============================

 USA_cabinet_cordell_hull:0 "Cordell Hull"
 USA_cabinet_cordell_hull_desc:0 "Secretary of State. A patient internationalist who believes free trade and dialogue are the surest roads to peace."
 USA_cabinet_isolationist_state:0 "An Isolationist Secretary"
 USA_cabinet_isolationist_state_desc:0 "Secretary of State. He keeps America aloof from foreign quarrels, hardening the nation against the drift toward war."
 USA_cabinet_morgenthau:0 "Henry Morgenthau Jr."
 USA_cabinet_morgenthau_desc:0 "Secretary of the Treasury. A devoted New Dealer who finances reform and public works without flinching."
 USA_cabinet_business_treasury:0 "A Man of Business"
 USA_cabinet_business_treasury_desc:0 "Secretary of the Treasury. A friend of industry and sound money who streamlines the nation's factories."
 USA_cabinet_stimson:0 "Henry Stimson"
 USA_cabinet_stimson_desc:0 "Secretary of War. A resolute interventionist preparing the army for the storm he is sure is coming."
 USA_cabinet_woodring:0 "Harry Woodring"
 USA_cabinet_woodring_desc:0 "Secretary of War. An isolationist who keeps the military lean and the budget modest."
 USA_cabinet_murphy:0 "Frank Murphy"
 USA_cabinet_murphy_desc:0 "Attorney General. A defender of civil liberties who holds the administration to its highest ideals."
 USA_cabinet_security_ag:0 "A Security Hawk"
 USA_cabinet_security_ag_desc:0 "Attorney General. A hard man who places the security of the Republic above the comforts of dissent."

 # ============================ NATIONAL SPIRITS ============================

 USA_the_second_new_deal_spirit:0 "The Second New Deal"
 USA_the_second_new_deal_spirit_desc:0 "A renewed commitment to reform drives construction and public confidence."
 USA_managed_economy_spirit:0 "A Managed Economy"
 USA_managed_economy_spirit_desc:0 "Coordinated industrial policy keeps the nation's factories running at full tilt."
 USA_the_inner_circle_spirit:0 "The Inner Circle"
 USA_the_inner_circle_spirit_desc:0 "A trusted cabinet amplifies the President's authority and steadies the ship of state."
 USA_progressive_coalition_spirit:0 "Progressive Coalition"
 USA_progressive_coalition_spirit_desc:0 "The reformers hold the reins, and the promise of the New Deal is secure."
 USA_conservative_coalition_spirit:0 "Conservative Coalition"
 USA_conservative_coalition_spirit_desc:0 "The Old Guard restores order and the confidence of enterprise."
 USA_economic_bill_of_rights_spirit:0 "Economic Bill of Rights"
 USA_economic_bill_of_rights_spirit_desc:0 "Economic security is now the birthright of every citizen, binding the nation together."
 USA_cooperative_commonwealth_spirit:0 "Cooperative Commonwealth"
 USA_cooperative_commonwealth_spirit_desc:0 "The great industries are turned to the service of the many. The social order is remade."
 USA_old_republic_spirit:0 "The Old Republic Restored"
 USA_old_republic_spirit_desc:0 "Limited government and free enterprise return to the heart of American life."
 USA_american_caesar_spirit:0 "The American Caesar"
 USA_american_caesar_spirit_desc:0 "A strong executive imposes order, at the cost of the old constitutional restraints."
 USA_scientific_establishment_spirit:0 "A Scientific Establishment"
 USA_scientific_establishment_spirit_desc:0 "A coordinated national research effort speeds American science forward."
 USA_operations_research_spirit:0 "Operations Research"
 USA_operations_research_spirit_desc:0 "Scientific method applied to war and industry sharpens both research and production."
 USA_total_mobilization_spirit:0 "Total Mobilization"
 USA_total_mobilization_spirit_desc:0 "The full might of American industry and manpower is committed to the war."
 USA_atomic_monopoly_spirit:0 "Atomic Monopoly"
 USA_atomic_monopoly_spirit_desc:0 "America alone commands the atom, and the world treads carefully."
 USA_lend_lease_spirit:0 "Arsenal of the Democracies"
 USA_lend_lease_spirit_desc:0 "American war material flows to friends across the seas with little political cost."
 USA_postwar_planning_spirit:0 "Postwar Planning"
 USA_postwar_planning_spirit_desc:0 "Careful preparation for the peace strengthens the President's hand at home and abroad."
 USA_bretton_woods_spirit:0 "Bretton Woods System"
 USA_bretton_woods_spirit_desc:0 "The dollar anchors a stable world economy built to American advantage."
 USA_united_nations_spirit:0 "The United Nations"
 USA_united_nations_spirit_desc:0 "A forum for the nations of the world lends American diplomacy unmatched reach."
 USA_marshall_plan_spirit:0 "The Marshall Plan"
 USA_marshall_plan_spirit_desc:0 "American aid rebuilds a shattered world and wins lasting friends."
 USA_iron_curtain_spirit:0 "Cold War Vigilance"
 USA_iron_curtain_spirit_desc:0 "A wary nation steels itself against the new rival across the divide."
 USA_containment_spirit:0 "Containment"
 USA_containment_spirit_desc:0 "America stands ready to hold the line wherever the rival power presses outward."
 USA_return_to_normalcy_spirit:0 "Return to Normalcy"
 USA_return_to_normalcy_spirit_desc:0 "A contented nation turns to peace and prosperity at home."
 USA_demobilization_spirit:0 "Demobilization"
 USA_demobilization_spirit_desc:0 "The armies come home and the economy turns to the abundance of peace."
 USA_permanent_establishment_spirit:0 "Permanent Military Establishment"
 USA_permanent_establishment_spirit_desc:0 "A standing military and its supporting industry keep America ready for any threat."
 USA_american_century_spirit:0 "The American Century"
 USA_american_century_spirit_desc:0 "Industry, ideals, and steady leadership place America at the summit of the world."

 # ============================ EVENTS ============================

 USA_cabinet.1.t:0 "The Inner Circle Assembles"
 USA_cabinet.1.d:0 "Around the long table in the Cabinet Room, the men who will steer the Republic through the coming storm have taken their seats. Each carries his own ambitions and his own vision of America's future. The President listens, weighs, and decides; but it is these advisors who will turn decision into action."
 USA_cabinet.1.a:0 "The work of governing begins."
 USA_cabinet.2.t:0 "Planning the Peace"
 USA_cabinet.2.d:0 "The war is not yet won, but already the cabinet turns its mind to what must follow. The chaos that doomed the last peace cannot be allowed to repeat. Economists, diplomats, and soldiers sketch the architecture of a new world order, with America at its center."
 USA_cabinet.2.a:0 "We will not repeat the mistakes of Versailles."
 USA_cabinet.3.t:0 "The American Century"
 USA_cabinet.3.d:0 "From the depths of the Depression to the summit of the world, the Republic has been remade by the choices of these years and the men who counseled them. Whatever road was taken, America now stands as the decisive power of the age, and the century to come will bear her mark."
 USA_cabinet.3.a:0 "Let us be worthy of it."
